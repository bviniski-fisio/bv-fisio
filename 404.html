<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>BV Fisioterapia — Sistema Integrado</title>
<meta name="description" content="Sistema de avaliação neurofuncional - Bianca Viniski Fisioterapia">
<meta name="theme-color" content="#E8844A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="https://bviniski-fisio.github.io/bv-fisio/icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="https://bviniski-fisio.github.io/bv-fisio/icons/icon-192.png">
<meta name="msapplication-TileColor" content="#E8844A">
<meta name="apple-mobile-web-app-title" content="BV Fisio">
<link rel="manifest" href="https://bviniski-fisio.github.io/bv-fisio/manifest.json"><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"><style>:root{--or:#E8844A;--or2:#C86A32;--or-p:#FDF0E8;--or-l:#F5A97A;--gr:#6B8F5E;--gr2:#4A6B3E;--gr-p:#EEF4EB;--ac:#E8844A;--ac2:#C86A32;--acp:#FDF0E8;--w:#FEFEFE;--g0:#F9F9F7;--g1:#F1F1ED;--g2:#E0E0D8;--g4:#9A9A90;--g6:#5A5A52;--g8:#282820;--sh0:0 1px 3px rgba(0,0,0,.05);--sh1:0 2px 8px rgba(0,0,0,.07);--sh2:0 6px 24px rgba(0,0,0,.09);--sh3:0 16px 48px rgba(0,0,0,.12);--r:10px;--r2:16px;}
/* PAIN MAP */
.pain-map-controls{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.pain-btn{padding:5px 11px;border-radius:6px;border:1.5px solid var(--g2);background:#f7f4f0;font-family:'DM Sans';font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;}
.pain-btn.active{background:var(--ac);color:#fff;border-color:var(--ac);}
.pain-btn.erase{background:#ede8e0;color:var(--g6);}
/* PHOTOS */
/* MASTER SYSTEM CSS */
.hdr-actions{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.hdr-btn{display:flex;align-items:center;gap:3px;padding:5px 9px;border-radius:18px;border:1.5px solid var(--g2);background:var(--g1);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;color:var(--g8);transition:background .15s;}
.hdr-btn:active{opacity:.7;}
.hdr-btn-blue{background:#1A5276;color:#fff;border-color:#154360;}
.hdr-btn-or{background:var(--acp);color:var(--ac);border-color:var(--ac);}
.hdr-btn-home{background:none;border:none;font-size:18px;padding:4px 6px;}
/* ── Sidebar mobile ── */
.master-header{background:var(--w);border-bottom:2.5px solid var(--or);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;position:sticky;top:0;z-index:200;box-shadow:var(--sh1);}
.mh-brand{display:flex;align-items:center;gap:10px;}
.mh-brand img{height:44px;width:auto;object-fit:contain;}
.mh-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;color:var(--or);}
.mh-sub{font-size:9px;color:#9a9a90;text-transform:uppercase;letter-spacing:1.8px;}
.save-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:#9a9a90;padding:4px 10px;border-radius:20px;background:#ede8e0;transition:all .3s;}
.save-pill.saving{color:var(--or);background:var(--or-p);}
.save-pill.saved{color:var(--gr2);background:var(--gr-p);}
.save-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.save-pill.saving .save-dot{animation:blink .7s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
/* LAYOUT */
.app-layout{display:flex;height:calc(100vh - 62px);overflow:hidden;}
/* SIDEBAR */
.master-sidebar{width:280px;min-width:280px;background:var(--w);border-right:1px solid var(--g1);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.sb-head{padding:14px 12px 8px;border-bottom:1px solid var(--g1);}
.sb-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#9a9a90;margin-bottom:8px;}
.btn-new-pt{width:100%;padding:9px 14px;background:linear-gradient(135deg,var(--or),var(--or2));color:#fff;border:none;border-radius:var(--r);font-family:'DM Sans';font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;}
.btn-new-pt:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(232,132,74,.35);}
.sb-search{margin-top:8px;position:relative;}
.sb-search input{width:100%;padding:7px 11px 7px 30px;border:1.5px solid var(--g2);border-radius:8px;font-family:'DM Sans';font-size:12px;background:#f7f4f0;outline:none;transition:border-color .2s;}
.sb-search input:focus{border-color:var(--or);background:var(--w);}
.sb-search-ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;color:#9a9a90;}
/* CONDITION FILTERS */
.cond-filters{padding:6px 10px;border-bottom:1px solid var(--g1);display:flex;gap:4px;flex-wrap:wrap;overflow-y:auto;max-height:120px;}
.cf-btn{padding:3px 8px;border-radius:14px;border:1.5px solid var(--g2);background:#f7f4f0;font-size:11px;cursor:pointer;transition:all .2s;color:var(--g6);white-space:nowrap;}
.cf-btn:hover,.cf-btn.active{background:var(--fcp,#FDF0E8);border-color:var(--fc,#E8844A);color:var(--fc,#E8844A);}
.cf-btn.all.active{background:var(--or-p);border-color:var(--or);color:var(--or);}
.cf-all-lbl{font-size:10px;font-weight:700;padding:4px 9px;border-radius:16px;border:1.5px solid var(--g2);background:#f7f4f0;cursor:pointer;transition:all .2s;}
/* PATIENT LIST */
.pt-list{overflow-y:auto;flex:1;padding:6px;}
.pt-card{padding:10px 12px;border-radius:9px;cursor:pointer;transition:all .15s;border:1.5px solid transparent;margin-bottom:3px;}
.pt-card:hover,.pt-card.on{background:var(--or-p);border-color:var(--or);}
.pt-card-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pt-card-meta{font-size:10px;color:#9a9a90;margin-top:2px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.pt-cond-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.pt-eval-chip{background:var(--or-p);color:var(--or2);border-radius:4px;padding:1px 5px;font-size:9px;font-weight:700;}
/* MAIN CONTENT */
.master-main{flex:1;overflow-y:auto;background:#f7f4f0;}
/* PATIENT PROFILE */
.pt-profile{max-width:960px;margin:0 auto;padding:20px;}
.pt-profile-header{background:linear-gradient(135deg,#6B7F5E,#4d5e43);border-radius:var(--r2);padding:20px 24px;color:#fff;margin-bottom:16px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:var(--sh2);}
.pt-name-big{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;margin-bottom:3px;}
.pt-info-row{font-size:11px;opacity:.78;margin-bottom:8px;}
.pt-cond-badges{display:flex;gap:7px;flex-wrap:wrap;}
.pt-cond-badge{padding:4px 12px;border-radius:16px;font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);}
.pt-hdr-actions{display:flex;gap:7px;align-items:flex-start;}
/* CONDITION SECTIONS */
.cond-section{background:var(--w);border-radius:var(--r);margin-bottom:12px;border:1px solid var(--g1);box-shadow:var(--sh0);overflow:hidden;}
.cs-header{padding:12px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--g1);cursor:pointer;transition:background .15s;}
.cs-header:hover{background:#f7f4f0;}
.cs-icon-box{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.cs-title{font-size:13px;font-weight:700;flex:1;}
.cs-stats{display:flex;gap:8px;align-items:center;}
.cs-stat-chip{background:#f7f4f0;border:1px solid var(--g2);border-radius:6px;padding:3px 9px;font-size:10px;font-weight:600;color:var(--g6);}
.cs-chev{color:#9a9a90;font-size:11px;transition:transform .2s;}
.cs-chev.op{transform:rotate(180deg);}
.cs-body{padding:0;display:none;}
.cs-body.op{display:block;}
/* EVAL CARDS */
.ev-list{padding:12px;}
.ev-card{background:#f7f4f0;border-radius:var(--r);padding:12px 16px;border:1.5px solid var(--g1);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px;transition:all .2s;}
.ev-card:hover{box-shadow:var(--sh1);border-color:var(--or-l);}
.ev-num{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;font-family:'Cormorant Garamond',serif;flex-shrink:0;background:var(--or-p);color:var(--or2);}
.ev-num.first{background:linear-gradient(135deg,var(--or),var(--or2));color:#fff;}
.ev-info h4{font-size:12px;font-weight:600;}
.ev-info p{font-size:10px;color:#9a9a90;margin-top:1px;}
.ev-chips{display:flex;gap:6px;flex-wrap:wrap;}
.sc{text-align:center;padding:4px 8px;border-radius:6px;background:var(--w);border:1px solid var(--g2);}
.sc-v{font-size:13px;font-weight:700;color:var(--gr2);font-family:'Cormorant Garamond',serif;}
.sc-l{font-size:8px;color:#9a9a90;text-transform:uppercase;}
.ev-acts{display:flex;gap:5px;}
.btn-add-ev{width:100%;padding:11px;border-radius:var(--r);border:2px dashed var(--or-l);background:var(--or-p);color:var(--or);font-family:'DM Sans';font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px;}
.btn-add-ev:hover{background:var(--w);box-shadow:var(--sh1);}
.add-cond-btn{display:flex;align-items:center;gap:8px;padding:12px 18px;border:2px dashed var(--g2);border-radius:var(--r);background:#f7f4f0;cursor:pointer;font-family:'DM Sans';font-size:12px;color:var(--g6);transition:all .2s;margin:12px;}
.add-cond-btn:hover{border-color:var(--or);color:var(--or);background:var(--or-p);}
/* CONDITION SELECTOR MODAL */
.cond-selector{background:var(--w);border-radius:var(--r2);padding:24px;width:520px;max-width:96vw;box-shadow:var(--sh3);animation:su .2s;}
.cond-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px;}
.cond-opt{padding:12px 10px;border-radius:var(--r);border:2px solid var(--g2);cursor:pointer;text-align:center;transition:all .2s;background:#f7f4f0;}
.cond-opt:hover{transform:translateY(-2px);box-shadow:var(--sh1);}
.cond-opt.selected{border-width:2.5px;}
.cond-opt.already{opacity:.4;cursor:default;pointer-events:none;}
.cond-opt .co-icon{font-size:22px;margin-bottom:5px;}
.cond-opt .co-name{font-size:10px;font-weight:700;color:#1a1a14;}
/* FORM VIEW */
.fv{max-width:900px;margin:0 auto;padding:20px;}
.fhdr{background:var(--w);border-radius:var(--r2);padding:16px 20px;margin-bottom:16px;border:1px solid var(--g1);box-shadow:var(--sh0);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.fhdr h3{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--ac);}
.fhdr p{font-size:10px;color:#9a9a90;margin-top:2px;}
.fhdr-r{display:flex;gap:7px;}
.fsec{background:var(--w);border-radius:var(--r);margin-bottom:10px;border:1px solid var(--g1);box-shadow:var(--sh0);overflow:hidden;}
.fsh{padding:11px 16px;border-bottom:1px solid var(--g1);display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;background:#f7f4f0;transition:background .15s;}
.fsh:hover{background:var(--acp,var(--or-p));}
.fsi{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,var(--ac,var(--or)),var(--ac2,var(--or2)));display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.fst{font-size:11px;font-weight:600;color:#1a1a14;flex:1;}
.fschev{color:#9a9a90;font-size:10px;transition:transform .2s;}
.fschev.op{transform:rotate(180deg);}
.fsb{padding:16px;display:none;}
.fsb.op{display:block;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:11px;}
.ff{display:flex;flex-direction:column;gap:4px;}
.ff.full{grid-column:1/-1;}
.ff label{font-size:9px;font-weight:700;color:var(--g6);text-transform:uppercase;letter-spacing:.8px;}
.ff input,.ff select,.ff textarea{padding:7px 10px;border:1.5px solid var(--g2);border-radius:7px;font-family:'DM Sans';font-size:12px;color:#1a1a14;background:#f7f4f0;outline:none;transition:all .2s;width:100%;}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--ac,var(--or));background:var(--w);box-shadow:0 0 0 3px rgba(232,132,74,.07);}
.ff textarea{resize:vertical;min-height:62px;line-height:1.5;}
.ro{background:var(--gr-p)!important;font-weight:700!important;color:var(--gr2)!important;}
.sub{font-size:9px;font-weight:700;color:var(--ac,var(--or));text-transform:uppercase;letter-spacing:1.2px;margin:14px 0 7px;padding-bottom:4px;border-bottom:1px solid var(--acp,var(--or-p));}
.ib{background:var(--or-p);border-left:3px solid var(--or);border-radius:0 6px 6px 0;padding:7px 11px;margin-bottom:10px;font-size:11px;color:var(--or2);font-weight:500;}
.ib-g{background:var(--gr-p);border-left:3px solid var(--gr);border-radius:0 6px 6px 0;padding:7px 11px;margin-bottom:10px;font-size:11px;color:var(--gr2);font-weight:500;}
.sr{display:grid;gap:7px;align-items:center;margin-bottom:6px;}
.sr4{grid-template-columns:2fr 60px 60px 82px;}
.sr3{grid-template-columns:2fr 70px 70px;}
.slbl{font-size:11px;color:var(--g6);font-weight:500;line-height:1.3;}
.si{text-align:center;padding:6px 4px;border:1.5px solid var(--g2);border-radius:6px;font-family:'DM Sans';font-size:12px;font-weight:600;color:var(--gr2);background:#f7f4f0;width:100%;outline:none;transition:all .2s;}
.si:focus{border-color:var(--gr);background:var(--w);}
.sh{font-size:8px;text-align:center;color:#9a9a90;font-weight:700;text-transform:uppercase;}
.tbar{background:var(--gr-p);padding:7px 11px;border-radius:0 0 6px 6px;display:flex;align-items:center;justify-content:space-between;}
.tbar span{font-size:11px;font-weight:700;color:var(--gr2);}
.how-to{background:var(--gr-p);border-left:3px solid var(--gr);border-radius:0 7px 7px 0;padding:7px 12px;margin:5px 0 10px;font-size:11px;color:var(--gr2);line-height:1.55;}
.sg{display:grid;gap:6px;margin:7px 0;}
.sg-2{grid-template-columns:repeat(2,1fr);}
.sg-3{grid-template-columns:repeat(3,1fr);}
.sg-4{grid-template-columns:repeat(4,1fr);}
.sg-5{grid-template-columns:repeat(5,1fr);}
@media(max-width:640px){.sg-3,.sg-4,.sg-5{grid-template-columns:repeat(2,1fr);}}
.sbox{display:flex;flex-direction:column;align-items:center;gap:3px;background:var(--w);border:1.5px solid var(--g2);border-radius:8px;padding:7px 5px;transition:border-color .2s;}
.sbox:focus-within{border-color:var(--ac,var(--or));}
.sbox-lbl{font-size:9px;font-weight:700;color:var(--g6);text-transform:uppercase;letter-spacing:.5px;text-align:center;line-height:1.3;}
.sbox-inp{width:50px;text-align:center;border:1.5px solid var(--g2);border-radius:6px;font-size:15px;font-weight:700;color:var(--gr2);padding:3px 4px;outline:none;font-family:'DM Sans';background:#f7f4f0;}
.sbox-inp:focus{border-color:var(--ac,var(--or));background:var(--w);}
.sbox-max{font-size:9px;color:#9a9a90;}
/* GUIDE */
.gd-wrap{max-width:900px;margin:0 auto;padding:20px;}
.gd-search{position:relative;margin-bottom:12px;}
.gd-search input{width:100%;padding:9px 14px 9px 34px;border:1.5px solid var(--g2);border-radius:9px;font-family:'DM Sans';font-size:12px;background:var(--w);outline:none;transition:border-color .2s;}
.gd-search input:focus{border-color:var(--ac,var(--or));}
.gd-search-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:#9a9a90;}
.gd-card{background:var(--w);border-radius:var(--r);margin-bottom:10px;border:1px solid var(--g1);box-shadow:var(--sh0);overflow:hidden;transition:box-shadow .2s;}
.gd-card:hover{box-shadow:var(--sh1);}
.gd-head{padding:11px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;background:#f7f4f0;border-bottom:1px solid var(--g1);}
.gd-head:hover{background:var(--acp,var(--or-p));}
.gd-ico{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--ac,var(--or)),var(--ac2,var(--or2)));display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.gd-title{font-size:12px;font-weight:700;color:#1a1a14;flex:1;}
.gd-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;}
.t-func{background:var(--gr-p);color:var(--gr2);}
.t-cog{background:#F0EBFA;color:#5A3F85;}
.t-mot{background:var(--or-p);color:var(--or2);}
.t-qv{background:#EBF3FA;color:#2E5F80;}
.t-resp{background:#FEF9EC;color:#92610A;}
.gd-chev{color:#9a9a90;font-size:10px;transition:transform .2s;}
.gd-chev.op{transform:rotate(180deg);}
.gd-body{padding:14px 16px;display:none;}
.gd-body.op{display:block;}
.gd-fn{font-size:10px;color:#9a9a90;margin-bottom:8px;font-style:italic;}
.gd-row{display:grid;grid-template-columns:110px 1fr;gap:6px;margin-bottom:6px;align-items:start;}
.gd-lbl{font-size:9px;font-weight:700;color:var(--g6);text-transform:uppercase;letter-spacing:.5px;}
.gd-val{font-size:11px;color:#1a1a14;line-height:1.5;}
.gd-tbl{width:100%;border-collapse:collapse;margin-top:8px;font-size:11px;}
.gd-tbl th{background:var(--ac,var(--or));color:#fff;padding:5px 9px;text-align:left;font-weight:600;}
.gd-tbl td{padding:4px 9px;border-bottom:1px solid var(--g1);}
.gd-tbl tr:nth-child(even) td{background:#f7f4f0;}
.gd-tip{background:var(--gr-p);border-left:3px solid var(--gr);border-radius:0 6px 6px 0;padding:7px 11px;margin-top:8px;font-size:11px;color:var(--gr2);}
.gd-hidden{display:none!important;}
/* REPORT */
.rpt-wrap{max-width:900px;margin:0 auto;padding:20px;}
.no-print{}
.rpt-notes-area{width:100%;min-height:120px;border:1.5px solid var(--g2);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;padding:10px;resize:vertical;outline:none;background:#f7f4f0;color:#1a1a14;line-height:1.6;box-sizing:border-box;}
.rpt-notes-area:focus{border-color:var(--or);background:var(--w);}
@media print{
  /* Oculta toda a UI exceto o relatório */
  .no-print{display:none!important;}
  .no-screen-watermark{display:none!important;}
  .master-header,.master-sidebar,.app-layout>*:not(.master-main){display:none!important;}
  .app-layout{display:block!important;height:auto!important;overflow:visible!important;}
  .master-main{width:100%!important;max-width:100%!important;height:auto!important;overflow:visible!important;padding:0!important;position:static!important;background:#fff!important;}
  body{background:#fff!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;font-size:10px!important;}

  /* Relatório */
  .fv,.pt-profile,.gd-wrap,.fv>*:not(.rpt-wrap),.pt-profile>*:not(.rpt-wrap){display:none!important;}
  .rpt-wrap{display:block!important;max-width:100%!important;padding:4px 6px!important;position:static!important;}
  .rpt-section{box-shadow:none!important;page-break-inside:avoid!important;margin-bottom:8px!important;overflow:visible!important;}
  .rpt-notes-area{border:1px solid #ccc!important;background:#fff!important;}
  .rpt-ta-print{display:block!important;}

  /* ── CABEÇALHO CLÍNICO: forçar altura compacta ── */
  .rpt-wrap>div:first-child{page-break-inside:avoid!important;}

  /* Limita TODA imagem do relatório — exceto header logo (tratado abaixo) */
  .rpt-section img{
    max-width:100%!important;
    height:auto!important;
    max-height:none!important;
  }

  /* ── LOGO no cabeçalho verde: fixar altura pequena ── */
  .rpt-header-logo{

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCAZuiz5aluuTTtDwwx_QhLajqeyKI0jP0",
    authDomain: "sistema-bv-fisio.firebaseapp.com",
    projectId: "sistema-bv-fisio",
    storageBucket: "sistema-bv-fisio.firebasestorage.app",
    messagingSenderId: "608630555301",
    appId: "1:608630555301:web:324a578485136e6607034c",
    measurementId: "G-K9S0N5WDE3"
  };

  const fbApp = initializeApp(firebaseConfig);
  const fbDB = getFirestore(fbApp);
  const fbAuth = getAuth(fbApp);

  // Login silencioso — roda por baixo do PIN, invisível ao usuário
  // As credenciais ficam hardcoded aqui pois o arquivo já exige PIN local
  // e as regras do Firestore restringem ao e-mail autorizado
  const FB_EMAIL    = 'bianca@bvfisio.com';
  const FB_PASSWORD = 'bv2026';

  window._fbAuthReady = new Promise(function(resolve) {
    onAuthStateChanged(fbAuth, function(user) {
      if (user) {
        resolve(user);
      } else {
        signInWithEmailAndPassword(fbAuth, FB_EMAIL, FB_PASSWORD)
          .then(function(cred) { resolve(cred.user); })
          .catch(function(err) {
            console.warn('Firebase Auth falhou:', err.code);
            resolve(null); // continua offline sem travar
          });
      }
    });
  });

  // ── SYNC ENGINE ──
  window._fbSave = async function(dbData) {
    try {
      await window._fbAuthReady;
      // Garante que _updated sempre existe e é válido antes de salvar na nuvem
      if (!dbData._updated || dbData._updated <= '1') {
        dbData._updated = new Date().toISOString();
      }
      const ts = dbData._updated;
      await setDoc(doc(fbDB, 'clinica', 'dados'), {
        db: JSON.stringify(dbData),
        updated: ts,
        nid: dbData.nid || 1
      });
    } catch(e) {
      console.warn('Firebase save error:', e);
    }
  };

  window._fbLoad = async function() {
    try {
      await window._fbAuthReady; // aguarda auth antes de ler
      const snap = await getDoc(doc(fbDB, 'clinica', 'dados'));
      if (snap.exists()) {
        const data = snap.data();
        if (data && data.db) {
          return JSON.parse(data.db);
        }
      }
    } catch(e) {
      console.warn('Firebase load error:', e);
    }
    return null;
  };

  // Real-time listener with debounce to avoid rapid re-renders
  window._fbListen = function(callback) {
    var debounceTimer = null;
    var unsubscribe = null;
    // Aguarda auth ANTES de iniciar o listener
    window._fbAuthReady.then(function(user) {
      if (!user) {
        console.warn('[FB] Sem autenticação — listener não iniciado');
        return;
      }
      unsubscribe = onSnapshot(doc(fbDB, 'clinica', 'dados'), (snap) => {
        if (snap.exists()) {
          try {
            const data = snap.data();
            if (data && data.db) {
              const parsed = JSON.parse(data.db);
              if (debounceTimer) clearTimeout(debounceTimer);
              debounceTimer = setTimeout(function() { callback(parsed); }, 400);
            }
          } catch(e) {}
        }
      }, function(err) {
        console.warn('[FB] onSnapshot erro:', err.code);
      });
    });
    // Retorna função para cancelar o listener se necessário
    return function() { if (unsubscribe) unsubscribe(); };
  };

  // Indicador de sync
  function addSyncDot(color) {
    var d = document.getElementById('syncDot');
    if (!d) {
      d = document.createElement('div');
      d.id = 'syncDot';
      d.style.cssText = 'position:fixed;bottom:12px;right:12px;width:10px;height:10px;border-radius:50%;z-index:9999;box-shadow:0 0 0 3px rgba(0,0,0,.1);transition:background .3s';
      document.body.appendChild(d);
    }
    d.style.background = color || '#6B8F5E';
    var ts = new Date().toLocaleTimeString('pt-BR');
    d.title = color === '#c62828' ? 'Sem conexão com nuvem — dados salvos localmente'
            : color === '#E8844A' ? 'Sincronizando com nuvem...'
            : 'Sincronizado ✓ às ' + ts;
  }

  // Aguarda o sistema BV inicializar completamente
  window.addEventListener('load', function() {
    // Aguarda loadDB terminar antes de sincronizar (usa _dbReady promise)
    var _waitForDB = window._dbReady || Promise.resolve();
    _waitForDB.then(async function() {
      addSyncDot('#E8844A'); // laranja = sincronizando

      try {
        const cloudData = await window._fbLoad();

        if (cloudData && Array.isArray(cloudData.patients)) {
          // Normaliza timestamps — string vazia ou ausente vira epoch zero
          const cloudTs = (cloudData._updated && cloudData._updated > '1') ? cloudData._updated : '1970-01-01T00:00:00.000Z';
          const localTs = (window.db && window.db._updated && window.db._updated > '1') ? window.db._updated : '1970-01-01T00:00:00.000Z';

          // Local só vence se seu timestamp for ESTRITAMENTE mais recente
          const localWins = localTs > cloudTs;

          if (!localWins) {
            // Nuvem vence — aplica e persiste localmente
            window.db = cloudData;
            window.db._updated = cloudTs;
            try { localStorage.setItem('bv_master_v1', JSON.stringify(window.db)); } catch(e) {}
            if (typeof renderList === 'function') renderList();
            if (typeof showWelcome === 'function') showWelcome();
            console.log('✅ Nuvem aplicada:', cloudData.patients.length, 'pacientes, ts:', cloudTs);
          } else {
            // Local é mais recente — sobe para nuvem
            if (window._fbSave) await window._fbSave(window.db);
            console.log('✅ Local enviado para nuvem:', window.db.patients.length, 'pacientes, ts:', localTs);
          }
          addSyncDot('#6B8F5E');

        } else {
          // Nuvem vazia — sobe o local
          if (window.db && window.db.patients && window.db.patients.length > 0) {
            window.db._updated = new Date().toISOString();
            if (window._fbSave) await window._fbSave(window.db);
            console.log('✅ Nuvem vazia — local enviado:', window.db.patients.length, 'pacientes');
          }
          addSyncDot('#6B8F5E');
        }
      } catch(e) {
        console.warn('Firebase erro:', e);
        addSyncDot('#c62828');
      }

      // Escuta mudanças em tempo real de outros dispositivos
      window._fbListen(function(cloudData) {
        if (window.curView === 'form') return;
        if (!cloudData || !cloudData.patients) return;

        // Listener também verifica timestamp — só aplica se nuvem for mais recente
        var cloudTs = (cloudData._updated && cloudData._updated > '1') ? cloudData._updated : '1970-01-01T00:00:00.000Z';
        var localTs = (window.db && window.db._updated && window.db._updated > '1') ? window.db._updated : '1970-01-01T00:00:00.000Z';

        if (cloudTs >= localTs) {
          window.db = cloudData;
          try { localStorage.setItem('bv_master_v1', JSON.stringify(cloudData)); } catch(e) {}
          if (typeof renderList === 'function') renderList();
          if (window.curView === 'patient' && window.curPid) {
            var p = window.db.patients.find(function(pt){ return pt.id === window.curPid; });
            if (p && typeof renderPatientProfile === 'function') renderPatientProfile(p);
          }
          addSyncDot('#6B8F5E');
          console.log('🔄 Atualizado de outro dispositivo:', cloudData.patients.length, 'pacientes, ts:', cloudTs);
        } else {
          console.log('⏭️ Ignorado — local mais recente:', localTs, '> nuvem:', cloudTs);
        }
      });

    }); // waits for DB to be ready

// ── NORMALIZE ──
function normalizeP(p){
  if(!p.conds) p.conds=[];
  if(!p.condEvals) p.condEvals={};
  if(!p.evolutions) p.evolutions=[];
  Object.keys(p.condEvals).forEach(function(c){
    p.condEvals[c]=(p.condEvals[c]||[]).filter(function(e){return e&&typeof e==='object';}).map(function(e){
      if(!e.data||typeof e.data!=='object')e.data={};
      return e;
    });
  });
  return p;
}

    req.onupgradeneeded=function(e){
      var db=e.target.result;
      if(!db.objectStoreNames.contains('app'))db.createObjectStore('app');
    };
    req.onsuccess=function(e){idb=e.target.result;resolve();};
    req.onerror=function(){resolve();};
   }catch(e){resolve();}
 });
}
function parseDB(p){
  return {
    patients:(p.patients||[]).map(normalizeP),
    nid:parseInt(p.nid||1)||1,
    _updated:(p._updated||''),
    appointments:(p.appointments||[]),
    pagamentos:(p.pagamentos||[]),
    evolutions:(p.evolutions||[])
  };
}
async function loadDB(){
  await initDB();
  try{
    // FIX: envolver a leitura do IndexedDB em Promise para aguardar corretamente
    if(idb){
      await new Promise(function(resolve){
        try{
          var tx=idb.transaction(['app'],'readonly');
          var st=tx.objectStore('app');
          var req=st.get(DB_KEY);
          req.onsuccess=function(){
            var p=req.result;
            if(p){
              db=parseDB(p);
            }
            resolve();
          };
          req.onerror=function(){ resolve(); };
        }catch(e){ resolve(); }
      });
    }
    // Só usa localStorage se IndexedDB não encontrou dados
    var raw=localStorage.getItem(DB_KEY);
    if(raw && (!db.patients || db.patients.length===0)){
      var p=JSON.parse(raw);
      db=parseDB(p);
    }
  }catch(e){db={patients:[],nid:1,appointments:[],pagamentos:[],evolutions:[]};}
}
function saveDB(){
  setSave('saving');
  try{
    // Sempre marca timestamp ISO antes de salvar (garante conflito resolvido por tempo)
    db._updated = new Date().toISOString();
    var serialized=JSON.stringify(db);
    try{ localStorage.setItem(DB_KEY,serialized); }
    catch(qe){ if(qe&&(qe.name==='QuotaExceededError'||qe.code===22)) toast('⚠️ Armazenamento local cheio! Exporte backup urgente.','err'); }
    if(idb){
      var tx=idb.transaction(['app'],'readwrite');
      tx.objectStore('app').put(db,DB_KEY);
    }
    // Sync to Firebase
    if(window._fbSave) {
      window._fbSave(db).then(function(){
        setSave('saved');
      }).catch(function(){
        setSave('saved'); // salvo local mesmo se nuvem falhar
      });
    } else {
      setTimeout(function(){setSave('saved');},350);
    }
    // Atualizar badge de avisos
    setTimeout(function(){if(typeof atualizarBadgeAvisos==='function')atualizarBadgeAvisos();},300);
  }catch(e){setSave('err');}
}
function setSave(s){var el=document.getElementById('sp'),t=document.getElementById('st');if(el)el.className='save-pill '+s;if(t)t.textContent=s==='saving'?'Salvando...':s==='err'?'Erro':'Salvo';}
window.addEventListener('beforeunload',function(){saveDB();});
window.addEventListener('visibilitychange',function(){if(document.hidden)saveDB();});
function schedSave(){if(saveT)clearTimeout(saveT);setSave('saving');saveT=setTimeout(function(){curView==='form'?collectSave():saveDB();},700);}

function fld(label,key,type,opts,extra){
  extra=extra||{};

  else if(type==='textarea'){inp='<textarea data-key="'+key+'" placeholder="'+(extra.ph||'')+'"></textarea>';}
  else if(type==='ro'){inp='<input data-key="'+key+'"'+(extra.id?' id="'+extra.id+'"':'')+' readonly class="ro" placeholder="Calculado...">';}

  return '<div class="ff'+(extra.full?' full':'')+'">'+'<label>'+label+'</label>'+inp+'</div>';
}

  els.forEach(function(el){total+=parseFloat(el.value)||0;max+=parseInt(el.getAttribute('max'))||0;});
  var d=document.getElementById('at_'+sfx),i=document.getElementById('athi_'+sfx);
  if(d)d.textContent=total+' / '+max;if(i)i.value=total;
  var named=document.querySelector('[data-key="'+sfx+'_total"]');
  if(named&&named!==i)named.value=total;

function showReport(pid){
  var p=db.patients.find(function(pt){return pt.id===pid;});
  if(!p)return;
  curView='guide';curPid=pid;
  setAccent('parkinson');

  // load all photos async then render selector
  var _allEvs=[];
  (p.conds||[]).forEach(function(c){_allEvs=_allEvs.concat((p.condEvals&&p.condEvals[c])||[]);});

function generateReport(pid){
  var p=db.patients.find(function(pt){return pt.id===pid;});
  if(!p)return;
  // Force-reload all photos then render
  var _allEvs2=[];
  (p.conds||[]).forEach(function(c){_allEvs2=_allEvs2.concat((p.condEvals&&p.condEvals[c])||[]);});
  var _loaded2=0;
  function _afterPhotos(){
    _loaded2++;
    if(_loaded2<_allEvs2.length)return;
    _allEvs2.forEach(function(ev){cleanPhotoStore(ev.id);});
    _doGenerateReport(pid,p);
  }
  if(_allEvs2.length===0){_doGenerateReport(pid,p);return;}
  _allEvs2.forEach(function(ev){loadPhotos(ev.id,_afterPhotos);});
  return;
}
function _doGenerateReport(pid,p){

  function fmtDate(d){return d?new Date(d+'T12:00:00').toLocaleDateString('pt-BR'):'—';}
  function cell(label,val){return '<div><span style="font-size:9px;font-weight:700;color:#6a6a62;text-transform:uppercase">'+label+'</span><div style="font-size:12px;margin-top:3px;color:#1a1a14">'+(val||'—')+'</div></div>';}
  function chk(id){var el=document.getElementById(id);return el&&el.checked;}

      +cell('Data de nasc.',p.birth?fmtDate(p.birth)+(p.age?' ('+p.age+')':''):'—')
      +cell('Sexo',p.sex)
      +cell('CPF',p.cpf)
      +cell('RG',p.rg)
      +cell('Telefone',p.phone)
      +cell('Endereço',p.endereco)
      +cell('Contato emergência',(p.emerg_nome||'')+(p.emerg_tel?' · '+p.emerg_tel:''))
      +cell('Prontuário',p.rec)
      +'</div></div>';
  }

  // ── DADOS MÉDICOS ──
  if(chk('sec_medico')){
    html+='<div class="rpt-section"><div class="rpt-sec-hd"><h4>🩺 Dados Médicos</h4></div>'
      +'<div style="padding:14px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px 16px">'
      +cell('Médico responsável',p.med)
      +cell('Condições clínicas',(p.conds||[]).map(function(c){return (COND_META[c]||{}).label||c;}).join(', ')||'—')
      +cell('Observações clínicas',p.obs)
      +'</div></div>';
  }

  // ── MEDICAMENTOS ──
  if(chk('sec_meds')){
    var medsHtml='';
    (p.conds||[]).forEach(function(cond){
      var evs=(p.condEvals&&p.condEvals[cond])||[];
      evs.slice().reverse().forEach(function(ev){
        var meds=ev.data&&(ev.data.medicamento||ev.data.medicamentos||ev.data.med||'');
        if(meds&&!medsHtml)medsHtml=meds;
      });
    });
    html+='<div class="rpt-section"><div class="rpt-sec-hd"><h4>💊 Medicamentos em Uso</h4></div>'
      +'<div style="padding:14px 16px;font-size:12px;line-height:1.7">'+(medsHtml||'<span style="color:#9a9a90">Nenhum medicamento registrado nas avaliações.</span>')+'</div></div>';
  }

  // ── AVALIAÇÕES POR CONDIÇÃO ──
  (p.conds||[]).forEach(function(cond){
    var m=COND_META[cond]||{};
    var allEvs=(p.condEvals&&p.condEvals[cond])||[];
    if(!allEvs.length)return;

    // filter selected evals
    var evs=allEvs.filter(function(ev){return chk('ev_'+ev.id);});
    if(!evs.length)return;

    var metrics=getMetrics(cond);
    var ev1=evs[0], evN=evs[evs.length-1];
    var d1=fmtDate(ev1.date), dN=fmtDate(evN.date);

    html+='<div class="rpt-section">'
      +'<div class="rpt-sec-hd" style="background:'+m.acp+'">'
      +'<div class="cs-icon-box" style="width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,'+m.ac+','+m.ac2+');display:inline-flex;align-items:center;justify-content:center;font-size:12px;margin-right:8px">'+m.icon+'</div>'
      +'<h4 style="color:'+m.ac+'">'+m.label+' — '+evs.length+' avaliação(ões) · '+d1+(evs.length>1?' a '+dN:'')+'</h4></div>';

    // Comparativo 1ª vs Última
    if(evs.length>=2&&chk('cmp_'+cond)){
      html+='<div style="padding:12px 16px">'
        +'<div style="font-size:10px;font-weight:700;color:#9a9a90;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Comparativo · Primeira vs Última Avaliação</div>'
        +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,150px));gap:10px;font-size:11px">';
      metrics.forEach(function(mt){
        var v1=ev1.data&&ev1.data[mt.key]||'';
        var vN=evN.data&&evN.data[mt.key]||'';
        if(!v1&&!vN)return;
        var n1=parseFloat(v1),nN=parseFloat(vN);
        var trendHtml='';
        if(!isNaN(n1)&&!isNaN(nN)&&n1!==nN){
          var imp=(nN>n1&&!mt.inv)||(nN<n1&&mt.inv);
          trendHtml='<span style="color:'+(imp?'var(--gr2)':'#C62828')+'">'+( imp?'↑':'↓')+'</span>';
        }
        html+='<div style="background:#f7f4f0;border-radius:8px;padding:8px">'
          +'<div style="font-size:9px;font-weight:700;color:#9a9a90">'+mt.label+'</div>'
          +'<div style="display:flex;align-items:center;gap:6px;margin-top:4px">'
          +'<span style="font-size:13px;font-weight:700;color:'+m.ac+'">'+( vN||'—')+'</span>'
          +(mt.unit?'<span style="font-size:9px;color:#9a9a90">'+mt.unit+'</span>':'')
          +trendHtml+'</div>'
          +'<div style="font-size:9px;color:#9a9a90;margin-top:2px">1ª: '+(v1||'—')+'</div>'
          +'</div>';
      });
      html+='</div></div>';
    }

    // Tabela completa
    if(chk('tab_'+cond)){
      html+='<div style="overflow-x:auto;padding:0 16px 14px"><table class="rpt-table"><tr><th>Escala</th><th>Unid.</th>';
      evs.forEach(function(ev){html+='<th>'+ev.type.replace('Reavaliação','Reav.')+'<br><small>'+fmtDate(ev.date)+'</small></th>';});
      html+='<th>Tendência</th></tr>';
      metrics.forEach(function(mt){
        var vals=evs.map(function(ev){return ev.data&&ev.data[mt.key]||'';});
        if(!vals.some(function(v){return v!=='';}))return;
        var nums=vals.map(function(v){return parseFloat(v);}).filter(function(v){return !isNaN(v);});
        var trend='—',tClass='rpt-stb';
        if(nums.length>=2){
          var diff=nums[nums.length-1]-nums[0];
          var imp=(diff>0&&!mt.inv)||(diff<0&&mt.inv);
          var wrs=(diff<0&&!mt.inv)||(diff>0&&mt.inv);
          if(imp){trend='↑ Melhora';tClass='rpt-imp';}
          else if(wrs){trend='↓ Piora';tClass='rpt-wrs';}
          else{trend='→ Estável';}
        }
        html+='<tr><td>'+mt.label+'</td><td style="color:#9a9a90">'+mt.unit+'</td>';
        vals.forEach(function(v,i){
          var cls='';
          if(v!==''&&nums.length>=2&&i>0){var n=parseFloat(v),ref=parseFloat(vals[0]);if(!isNaN(n)&&!isNaN(ref)&&n!==ref){cls=' class="'+(((n>ref&&!mt.inv)||(n<ref&&mt.inv))?'rpt-imp':'rpt-wrs')+'"';}}
          html+='<td'+cls+'>'+(v||'—')+'</td>';
        });
        html+='<td class="'+tClass+'">'+trend+'</td></tr>';
      });
      html+='</table></div>';
    }

    html+='</div>';
  });


  // ── COMPARATIVO FOTOGRÁFICO ──
  var photoSection='';
  (p.conds||[]).forEach(function(cond){
    var m=COND_META[cond]||{};
    var allEvs=(p.condEvals&&p.condEvals[cond])||[];
    var evs=allEvs.filter(function(ev){return chk('ph_'+ev.id)&&(photoStore[ev.id]||[]).some(function(ph){return ph.src;});});
    if(!evs.length)return;
    var picks=[];
    if(evs.length===1)picks=[evs[0]];
    else if(evs.length===2)picks=[evs[0],evs[evs.length-1]];
    else{var mid=Math.floor((evs.length-1)/2);picks=[evs[0],evs[mid],evs[evs.length-1]];}
    var pickLabels=['1ª Avaliação','Intermediária','Última Avaliação'];
    if(picks.length===2)pickLabels=['1ª Avaliação','Última Avaliação'];
    if(picks.length===1)pickLabels=['Avaliação'];
    var fmtD=function(d){return d?new Date(d+'T12:00:00').toLocaleDateString('pt-BR'):'—';};
    var cols=picks.length;
    // ── cabeçalho da condição ──
    photoSection+='<div style="margin-bottom:20px">';
    photoSection+='<div style="font-size:12px;font-weight:700;color:'+m.ac+';margin-bottom:10px">'+m.icon+' '+m.label+'</div>';
    // ── linha de datas (cabeçalho das colunas) ──
    photoSection+='<div style="display:grid;grid-template-columns:80px repeat('+cols+',1fr);gap:6px;margin-bottom:8px;align-items:center">';
    photoSection+='<div></div>';
    picks.forEach(function(ev,i){
      photoSection+='<div style="text-align:center;background:'+m.acp+';border-radius:6px;padding:5px 4px">';
      photoSection+='<div style="font-size:9px;font-weight:700;color:'+m.ac+'">'+pickLabels[i]+'</div>';
      photoSection+='<div style="font-size:8px;color:var(--g5);margin-top:1px">'+fmtD(ev.date)+'</div>';
      photoSection+='</div>';
    });
    photoSection+='</div>';
    if(cond==='escoliose'){
      var EVIEWS=[
        {key:'frontal',label:'Vista Frontal',icon:'🧍'},
        {key:'lat_dir',label:'Lat. Direita',icon:'→'},
        {key:'lat_esq',label:'Lat. Esquerda',icon:'←'},
        {key:'posterior',label:'Posterior',icon:'🔙'},
        {key:'adams',label:'Adams',icon:'🤸'},
        {key:'adams_dir',label:'Adams Dir.',icon:'↗'},
        {key:'adams_esq',label:'Adams Esq.',icon:'↖'}
      ];
      EVIEWS.forEach(function(v){
        var hasView=picks.some(function(ev){var photos=photoStore[ev.id]||[];return photos.some(function(ph){return ph.key===v.key&&ph.src;});});
        if(!hasView)return;
        photoSection+='<div style="display:grid;grid-template-columns:80px repeat('+cols+',1fr);gap:6px;margin-bottom:8px;align-items:center;page-break-inside:avoid">';
        // Label da vista
        photoSection+='<div style="font-size:8px;font-weight:600;color:var(--g5);text-align:right;padding-right:6px;text-transform:uppercase;letter-spacing:.4px;line-height:1.3">'+v.icon+'<br>'+v.label+'</div>';
        picks.forEach(function(ev){
          var photos=photoStore[ev.id]||[];
          var ph=photos.find(function(p){return p.key===v.key&&p.src;});
          if(ph&&ph.src){
            photoSection+='<img src="'+ph.src+'" style="width:100%;aspect-ratio:3/4;object-fit:contain;background:#f7f4f0;border-radius:6px;border:1.5px solid '+m.ac+'40">';
          } else {
            photoSection+='<div style="aspect-ratio:3/4;background:var(--g1);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--g4)">—</div>';
          }
        });
        photoSection+='</div>';
      });
    } else {
      // Para não-escoliose: agrupa por ph.view (label da vista)
      // Coleta todas as views únicas presentes nas avaliações selecionadas
      var viewOrder=[];
      var viewSet={};
      picks.forEach(function(ev){
        var photos=(photoStore[ev.id]||[]).filter(function(ph){return ph.src&&ph.src.length>200;});
        photos.forEach(function(ph){
          var vk=ph.view||'Sem rótulo';
          if(!viewSet[vk]){viewSet[vk]=true;viewOrder.push(vk);}
        });
      });
      if(viewOrder.length===0){
        // Sem views identificadas: mostra por ordem de posição (up to 8 slots)
        var maxPhotos=0;
        picks.forEach(function(ev){
          var cnt=(photoStore[ev.id]||[]).filter(function(ph){return ph.src&&ph.src.length>200;}).length;
          if(cnt>maxPhotos)maxPhotos=cnt;
        });
        for(var slot=0;slot<maxPhotos;slot++){
          photoSection+='<div style="display:grid;grid-template-columns:80px repeat('+cols+',1fr);gap:6px;margin-bottom:8px;align-items:center;page-break-inside:avoid">';
          photoSection+='<div style="font-size:8px;font-weight:600;color:var(--g5);text-align:right;padding-right:6px">Foto '+(slot+1)+'</div>';
          picks.forEach(function(ev){
            var photos=(photoStore[ev.id]||[]).filter(function(ph){return ph.src&&ph.src.length>200;});
            var ph=photos[slot];
            if(ph&&ph.src){
              photoSection+='<img src="'+ph.src+'" style="width:100%;aspect-ratio:3/4;object-fit:contain;background:#f7f4f0;border-radius:6px;border:1.5px solid '+m.ac+'40">';
            } else {
              photoSection+='<div style="aspect-ratio:3/4;background:var(--g1);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--g4)">—</div>';
            }
          });
          photoSection+='</div>';
        }
      } else {
        // Mostra cada view como uma linha, colunas = avaliações
        viewOrder.forEach(function(vk){
          photoSection+='<div style="display:grid;grid-template-columns:80px repeat('+cols+',1fr);gap:6px;margin-bottom:8px;align-items:center;page-break-inside:avoid">';
          photoSection+='<div style="font-size:8px;font-weight:600;color:var(--g5);text-align:right;padding-right:6px;text-transform:uppercase;letter-spacing:.4px;line-height:1.3">'+vk+'</div>';
          picks.forEach(function(ev){
            var photos=(photoStore[ev.id]||[]).filter(function(ph){return ph.src&&ph.src.length>200;});
            var ph=photos.find(function(p){return (p.view||'Sem rótulo')===vk;});
            if(ph&&ph.src){
              photoSection+='<img src="'+ph.src+'" style="width:100%;aspect-ratio:3/4;object-fit:contain;background:#f7f4f0;border-radius:6px;border:1.5px solid '+m.ac+'40">';
            } else {
              photoSection+='<div style="aspect-ratio:3/4;background:var(--g1);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--g4)">—</div>';
            }
          });
          photoSection+='</div>';
        });
      }
    }
    photoSection+='</div>';
  });
  if(photoSection){
    html+='<div class="rpt-section"><div class="rpt-sec-hd"><h4>📸 Comparativo Fotográfico</h4></div>'
      +'<div style="padding:14px 16px">'+photoSection+'</div></div>';
  }


  // ── CONDUTAS TERAPÊUTICAS ──
  html+='<div class="rpt-section">'
    +'<div class="rpt-sec-hd"><h4>🏋️ Condutas Terapêuticas</h4></div>'
    +'<div style="padding:14px 16px">'
    +'<div class="no-print" style="font-size:10px;color:#9a9a90;margin-bottom:8px">Descreva as condutas aplicadas neste ciclo de tratamento. Este campo será incluído no PDF.</div>'
    +'<textarea id="rpt_condutas" class="rpt-notes-area" placeholder="Ex: Eletroterapia com TENS modo burst, 30 min · Cinesioterapia: fortalecimento de core e membros inferiores · Treino de marcha com obstáculos · Liberação miofascial cervical..."></textarea>'
    +'</div></div>';

  // ── OBSERVAÇÕES CLÍNICAS ──
  html+='<div class="rpt-section">'
    +'<div class="rpt-sec-hd"><h4>📝 Observações Clínicas</h4></div>'
    +'<div style="padding:14px 16px">'
    +'<div class="no-print" style="font-size:10px;color:#9a9a90;margin-bottom:8px">Observações gerais, intercorrências, metas e orientações ao paciente/familiar.</div>'
    +'<textarea id="rpt_obs" class="rpt-notes-area" placeholder="Ex: Paciente apresentou boa resposta à estimulação, refere redução de 3 pontos na EVA. Orientado quanto à importância da continuidade dos exercícios domiciliares. Próxima reavaliação em 30 dias..."></textarea>'
    +'</div></div>';


  // ── ASSINATURA ──
  html+='<div class="rpt-section" style="border:1.5px solid #E8844A;page-break-inside:avoid">';
  html+='<div class="rpt-sec-hd" style="background:#FDF0E8"><h4 style="color:#C86A32">✍️ Assinatura do Profissional</h4></div>';
  html+='<div style="padding:24px 20px;display:flex;flex-direction:column;align-items:center;gap:10px">';
  html+='<img src="'+LOGO_ICON_SRC+'" style="height:30px;width:auto;object-fit:contain;opacity:.4">';
  html+='<div style="text-align:center;margin-top:36px;width:260px">';
  html+='<div style="border-top:1.5px solid #1a1a14;padding-top:8px">';
  html+='<div style="font-size:13px;font-weight:700;font-family:Georgia,serif;color:#1a1a14">Bianca Viniski</div>';
  html+='<div style="font-size:9.5px;color:#9a9a90;margin-top:2px">Fisioterapeuta · CREFITO: 409973-F</div>';
  html+='</div></div>';
  html+='</div>';
  html+='</div>';
  // Date footer
  html+='<div style="text-align:right;font-size:10px;color:#9a9a90;margin-top:8px;padding:0 4px">';
  html+='Recife, '+new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  html+='</div>';

  html+='</div>';
  document.getElementById('mainArea').innerHTML=html;
}


// ════════════════════════════════════════════════════════
// DASHBOARD — Evolução Geral + Por Paciente
// ════════════════════════════════════════════════════════
function showDashboard(){
  curView='dashboard';
  var main=document.getElementById('mainArea');
  if(!main) return;

  // Aggregate stats
  var pts=db.patients||[];
  var totalPts=pts.length;
  var totalEvals=0;
  var condCount={};
  pts.forEach(function(p){
    (p.conds||[]).forEach(function(c){
      condCount[c]=(condCount[c]||0)+1;
    });
    Object.values(p.condEvals||{}).forEach(function(evs){
      totalEvals+=evs.length;
    });
  });

  // Build condition distribution data
  var condLabels=[], condVals=[], condColors=[];
  Object.keys(condCount).forEach(function(k){
    var m=COND_META[k]||{label:k,ac:'#999'};
    condLabels.push(m.label);
    condVals.push(condCount[k]);
    condColors.push(m.ac);
  });

  // Recent activity (last 30 days)
  var now=new Date(); var cutoff=new Date(now-30*86400000);
  var recentPts=pts.filter(function(p){
    return Object.values(p.condEvals||{}).some(function(evs){
      return evs.some(function(e){return e.date&&new Date(e.date)>=cutoff;});
    });
  }).length;

  // Build patient selector for evolution chart
  var ptOptions=pts.map(function(p){
    return '<option value="'+p.id+'">'+p.name+'</option>';
  }).join('');

  var html='<div style="padding:16px;max-width:900px;margin:0 auto">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">'
    +'<h2 style="font-family:Georgia,serif;color:#1a1a14;font-size:20px">📊 Dashboard</h2>'
    +'<button class="btn" onclick="renderList();document.getElementById(\'mainArea\').innerHTML=\'\'">← Voltar</button>'
    +'</div>'

    // KPI cards
    +'<div class="dash-kpi-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px">'
    +kpiCard('👥','Pacientes',totalPts,'total cadastrados','#E8844A')
    +kpiCard('📋','Avaliações',totalEvals,'total realizadas','#5B8A6B')
    +kpiCard('🗓️','Ativos (30d)',recentPts,'com avaliação recente','#4A7FA5')
    +kpiCard('🏥','Condições',Object.keys(condCount).length,'diferentes tratadas','#A05CA0')
    +'</div>'

    // Charts row
    +'<div class="dash-charts-row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">'
    // Condition distribution bar chart
    +'<div style="background:#fff;border:1px solid #e0d8cc;border-radius:10px;padding:14px">'
    +'<div style="font-size:11px;font-weight:700;color:#6a6a62;margin-bottom:12px;text-transform:uppercase;letter-spacing:.8px">Pacientes por Condição</div>'
    +'<canvas id="dash_cond_chart" height="180"></canvas>'
    +'</div>'
    // Monthly evals line chart
    +'<div style="background:#fff;border:1px solid #e0d8cc;border-radius:10px;padding:14px">'
    +'<div style="font-size:11px;font-weight:700;color:#6a6a62;margin-bottom:12px;text-transform:uppercase;letter-spacing:.8px">Avaliações por Mês (12 meses)</div>'
    +'<canvas id="dash_month_chart" height="180"></canvas>'
    +'</div>'
    +'</div>'

    // Evolution chart per patient
    +'<div style="background:#fff;border:1px solid #e0d8cc;border-radius:10px;padding:14px;margin-bottom:20px">'
    +'<div style="font-size:11px;font-weight:700;color:#6a6a62;margin-bottom:10px;text-transform:uppercase;letter-spacing:.8px">📈 Evolução do Paciente</div>'
    +(pts.length===0?'<p style="color:#9a9a90;font-size:12px">Nenhum paciente cadastrado.</p>'
    :'<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px">'
    +'<select id="dash_pt_sel" onchange="dashLoadPatient(this.value)" style="padding:6px 10px;border-radius:8px;border:1px solid #ddd;font-size:12px;flex:1;min-width:150px"><option value="">— Selecione paciente —</option>'+ptOptions+'</select>'
    +'<select id="dash_cond_sel" onchange="dashLoadMetric()" style="padding:6px 10px;border-radius:8px;border:1px solid #ddd;font-size:12px;flex:1;min-width:120px"></select>'
    +'<select id="dash_metric_sel" onchange="dashLoadMetric()" style="padding:6px 10px;border-radius:8px;border:1px solid #ddd;font-size:12px;flex:1;min-width:120px"></select>'
    +'</div>'
    +'<canvas id="dash_evol_chart" height="200"></canvas>'
    +'<div id="dash_evol_table" style="margin-top:12px"></div>')
    +'</div>'

    // Patient list summary
    +'<div style="background:#fff;border:1px solid #e0d8cc;border-radius:10px;padding:14px">'
    +'<div style="font-size:11px;font-weight:700;color:#6a6a62;margin-bottom:10px;text-transform:uppercase;letter-spacing:.8px">Resumo de Pacientes</div>'
    +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">'
    +'<thead><tr style="background:#f5f0eb"><th style="padding:7px 10px;text-align:left;font-weight:700;color:#5a5a52">Paciente</th><th style="padding:7px 10px;text-align:center">Condições</th><th style="padding:7px 10px;text-align:center">Avals.</th><th style="padding:7px 10px;text-align:left">Última Aval.</th></tr></thead>'
    +'<tbody>'
    +pts.map(function(p,i){
      var allEvs=Object.values(p.condEvals||{}).flat();
      var lastDate=allEvs.reduce(function(best,e){return (!best||e.date>best)?e.date:best;},'');

function dashDrawCondChart(labels,vals,colors){
  var canvas=document.getElementById('dash_cond_chart');
  if(!canvas||!canvas.getContext) return;
  if(!labels.length){canvas.getContext('2d').fillText('Sem dados',10,80);return;}
  var ctx=canvas.getContext('2d');
  var W=canvas.offsetWidth||280; canvas.width=W; canvas.height=180;
  var max=Math.max.apply(null,vals)||1;
  var barW=Math.floor((W-40)/(labels.length))-4;
  var padL=8,padB=40,h=canvas.height-padB-10;
  ctx.clearRect(0,0,W,canvas.height);
  ctx.font='10px Arial'; ctx.textAlign='center';
  labels.forEach(function(lbl,i){
    var x=padL+i*(barW+4);
    var bh=Math.round(vals[i]/max*h);
    var y=10+h-bh;
    ctx.fillStyle=colors[i]||'#5B8A6B';
    ctx.beginPath(); ctx.roundRect?ctx.roundRect(x,y,barW,bh,3):ctx.rect(x,y,barW,bh); ctx.fill();
    ctx.fillStyle='#1a1a14'; ctx.fillText(vals[i],x+barW/2,y-3);
    // label (truncated)
    var short=lbl.length>8?lbl.substr(0,7)+'…':lbl;
    ctx.fillStyle='#6a6a62'; ctx.fillText(short,x+barW/2,canvas.height-8);
  });
}

function dashDrawMonthChart(){
  var canvas=document.getElementById('dash_month_chart');
  if(!canvas||!canvas.getContext) return;
  var pts=db.patients||[];
  var now=new Date();
  var months=[];
  for(var i=11;i>=0;i--){
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push({y:d.getFullYear(),m:d.getMonth(),count:0,
      label:(d.getMonth()+1)+'/'+String(d.getFullYear()).slice(2)});
  }
  pts.forEach(function(p){
    Object.values(p.condEvals||{}).flat().forEach(function(ev){
      if(!ev.date) return;
      var d=new Date(ev.date+'T12:00');
      months.forEach(function(mo){
        if(d.getFullYear()===mo.y&&d.getMonth()===mo.m) mo.count++;
      });
    });
  });
  var W=canvas.offsetWidth||280; canvas.width=W; canvas.height=180;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,canvas.height);
  var vals=months.map(function(m){return m.count;});
  var max=Math.max.apply(null,vals)||1;
  var padL=24,padB=24,padT=10;
  var W2=W-padL-8, H2=canvas.height-padB-padT;
  var step=W2/(months.length-1);
  // Grid lines
  ctx.strokeStyle='#f0ece6'; ctx.lineWidth=1;
  [0,.25,.5,.75,1].forEach(function(f){
    var y=padT+H2*(1-f);
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(padL+W2,y); ctx.stroke();
    ctx.fillStyle='#9a9a90'; ctx.font='9px Arial'; ctx.textAlign='right';
    ctx.fillText(Math.round(max*f),padL-3,y+3);
  });
  // Line
  ctx.strokeStyle='#4A7FA5'; ctx.lineWidth=2; ctx.beginPath();
  months.forEach(function(mo,i){
    var x=padL+i*step, y=padT+H2*(1-mo.count/max);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  // Dots + labels
  ctx.fillStyle='#4A7FA5';
  months.forEach(function(mo,i){
    var x=padL+i*step, y=padT+H2*(1-mo.count/max);
    ctx.beginPath(); ctx.arc(x,y,3,0,2*Math.PI); ctx.fill();
    if(i%3===0){
      ctx.fillStyle='#9a9a90'; ctx.font='8px Arial'; ctx.textAlign='center';
      ctx.fillText(mo.label,x,canvas.height-4);
      ctx.fillStyle='#4A7FA5';
    }
    if(mo.count>0){
      ctx.fillStyle='#1a1a14'; ctx.font='9px Arial'; ctx.textAlign='center';
      ctx.fillText(mo.count,x,y-6);
      ctx.fillStyle='#4A7FA5';
    }
  });
}

function dashDrawEvol(pid,cond,metricKey){
  var canvas=document.getElementById('dash_evol_chart');
  var tblDiv=document.getElementById('dash_evol_table');
  if(!canvas) return;
  var p=(db.patients||[]).find(function(pt){return pt.id==pid;});
  if(!p||!metricKey) return;
  var evs=(p.condEvals&&p.condEvals[cond])||[];
  var pts2=evs.filter(function(e){return e.data&&e.data[metricKey]!=null&&e.data[metricKey]!=='';})
    .map(function(e){
      return {date:e.date,val:parseFloat(e.data[metricKey])||0,
              lbl:e.date?new Date(e.date+'T12:00').toLocaleDateString('pt-BR'):'—'};
    });
  if(!pts2.length){
    var ctx2=canvas.getContext('2d');
    var W=canvas.offsetWidth||600; canvas.width=W; canvas.height=200;
    ctx2.clearRect(0,0,W,200);
    ctx2.fillStyle='#9a9a90'; ctx2.font='13px Arial'; ctx2.textAlign='center';
    ctx2.fillText('Sem dados para esta métrica',W/2,100);
    if(tblDiv) tblDiv.innerHTML='';
    return;
  }
  var metrics=getMetrics(cond);
  var mMeta=metrics.find(function(m){return m.key===metricKey;})||{label:metricKey,unit:''};
  var vals=pts2.map(function(p){return p.val;});
  var minV=Math.min.apply(null,vals), maxV=Math.max.apply(null,vals);
  var range=maxV-minV||1;
  var W=canvas.offsetWidth||600; canvas.width=W; canvas.height=200;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,canvas.height);
  var padL=46,padB=32,padT=16,padR=16;
  var CW=W-padL-padR, CH=canvas.height-padB-padT;
  var step=pts2.length>1?CW/(pts2.length-1):CW/2;
  var ac=COND_META[cond]?COND_META[cond].ac:'#4A7FA5';
  // Grid
  ctx.strokeStyle='#f0ece6'; ctx.lineWidth=1;
  [0,.25,.5,.75,1].forEach(function(f){
    var yv=minV+range*f;
    var y=padT+CH*(1-f);
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(padL+CW,y); ctx.stroke();
    ctx.fillStyle='#9a9a90'; ctx.font='9px Arial'; ctx.textAlign='right';
    ctx.fillText(yv.toFixed(1),padL-4,y+3);
  });
  // Area fill
  ctx.beginPath();
  pts2.forEach(function(pt,i){
    var x=padL+(pts2.length>1?i*step:CW/2);
    var y=padT+CH*(1-(pt.val-minV)/range);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.lineTo(padL+(pts2.length>1?(pts2.length-1)*step:CW/2),padT+CH);
  ctx.lineTo(padL,padT+CH);
  ctx.closePath();
  ctx.fillStyle=ac+'22'; ctx.fill();
  // Line
  ctx.strokeStyle=ac; ctx.lineWidth=2.5; ctx.beginPath();
  pts2.forEach(function(pt,i){
    var x=padL+(pts2.length>1?i*step:CW/2);
    var y=padT+CH*(1-(pt.val-minV)/range);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  // Dots + values
  pts2.forEach(function(pt,i){
    var x=padL+(pts2.length>1?i*step:CW/2);
    var y=padT+CH*(1-(pt.val-minV)/range);
    ctx.beginPath(); ctx.arc(x,y,5,0,2*Math.PI);
    ctx.fillStyle='#fff'; ctx.fill();
    ctx.strokeStyle=ac; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#1a1a14'; ctx.font='bold 10px Arial'; ctx.textAlign='center';
    ctx.fillText(pt.val+mMeta.unit,x,y-9);
    ctx.fillStyle='#9a9a90'; ctx.font='8px Arial';
    ctx.fillText(pt.lbl,x,canvas.height-4);
  });
  // Trend arrow
  if(pts2.length>=2){
    var first=pts2[0].val, last=pts2[pts2.length-1].val;
    var diff=last-first;
    var arrow=diff>0?'↑':diff<0?'↓':'→';
    var col=diff>0?'#27ae60':diff<0?'#e74c3c':'#9a9a90';
    ctx.fillStyle=col; ctx.font='bold 14px Arial'; ctx.textAlign='left';
    ctx.fillText(arrow+' '+Math.abs(diff).toFixed(1)+mMeta.unit,padL+4,padT+14);
  }
  // Table
  if(tblDiv){
    var rows=pts2.map(function(pt,i){
      var delta=i>0?(pt.val-pts2[i-1].val):null;
      var deltaStr=delta!==null?(delta>=0?'<span style="color:#27ae60">+'+delta.toFixed(1)+'</span>':'<span style="color:#e74c3c">'+delta.toFixed(1)+'</span>'):'—';
      return '<tr style="border-bottom:1px solid #f0ece6">'
        +'<td style="padding:5px 10px">'+pt.lbl+'</td>'
        +'<td style="padding:5px 10px;text-align:center;font-weight:700">'+pt.val+' '+mMeta.unit+'</td>'
        +'<td style="padding:5px 10px;text-align:center">'+deltaStr+'</td>'
        +'</tr>';
    });
    tblDiv.innerHTML='<table style="width:100%;border-collapse:collapse;font-size:11px">'
      +'<thead><tr style="background:#f5f0eb"><th style="padding:5px 10px;text-align:left">Data</th><th style="padding:5px 10px;text-align:center">'+mMeta.label+'</th><th style="padding:5px 10px;text-align:center">Δ</th></tr></thead>'
      +'<tbody>'+rows.join('')+'</tbody></table>';
  }
}

function savePDF(){
  var wrap=document.querySelector('.rpt-wrap');
  if(!wrap){alert('Abra um relatório antes de imprimir o PDF.');return;}

  // 1. Captura valores das textareas
  var taData=[];
  wrap.querySelectorAll('textarea').forEach(function(ta){
    taData.push({el:ta,val:ta.value});
  });

  // 2. Substitui textareas por divs para impressão
  var replacedPairs=[];
  taData.forEach(function(item){
    var div=document.createElement('div');
    div.className='rpt-ta-print';
    div.style.cssText='font-size:12px;line-height:1.8;white-space:pre-wrap;padding:10px 12px;border:1px solid #ccc;border-radius:6px;min-height:60px;background:#fff;font-family:inherit;color:#1a1a14;';
    div.textContent=item.val;
    item.el.parentNode.insertBefore(div,item.el);
    item.el.style.display='none';
    replacedPairs.push({div:div,ta:item.el});
  });

  // 3. Adiciona @page e estilos extras de impressão temporários
  var styleEl=document.createElement('style');
  styleEl.id='pdf-temp-style';
  styleEl.textContent=[
    '@page{size:A4;margin:14mm 13mm 14mm 13mm;}',
    '@media print{',
    '  .rpt-ta-print{display:block!important;}',
    '  .rpt-section{page-break-inside:avoid;margin-bottom:10px!important;}',
    '  .rpt-wrap{max-width:100%!important;padding:8px!important;}',
    '  img{max-width:100%!important;height:auto!important;}',
    '}'
  ].join('');
  document.head.appendChild(styleEl);

  // 4. Imprime
  window.print();

  // 5. Restaura tudo após impressão
  setTimeout(function(){
    replacedPairs.forEach(function(pair){
      pair.div.parentNode.removeChild(pair.div);
      pair.ta.style.display='';
    });
    var s=document.getElementById('pdf-temp-style');
    if(s)s.parentNode.removeChild(s);
  },500);
}

function exportarDados(){
  // Coleta db principal
  var exportData = {
    version: 2,
    exportDate: new Date().toISOString(),
    db: JSON.parse(JSON.stringify(db)),
    photos: {}
  };
  // Coleta todas as fotos separadas (bv_photos_*)
  for(var i=0; i<localStorage.length; i++){
    var k = localStorage.key(i);
    if(k && k.startsWith('bv_photos_')){
      try{ exportData.photos[k] = JSON.parse(localStorage.getItem(k)); }catch(e){}
    }
  }
  var json = JSON.stringify(exportData);
  var blob = new Blob([json], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var d = new Date();
  a.href = url;
  a.download = 'BV_Backup_' + d.getFullYear() + ('0'+(d.getMonth()+1)).slice(-2) + ('0'+d.getDate()).slice(-2) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  alert('✅ Dados exportados com sucesso!\n\nTransfira o arquivo .json para o outro dispositivo e use "📥 Importar" para restaurar.');
}

function importarDados(){
  if(!confirm('⚠️ ATENÇÃO\n\nImportar irá SUBSTITUIR todos os dados atuais neste dispositivo pelos dados do arquivo.\n\nDeseja continuar?')) return;
  var inp = document.createElement('input');
  inp.type='file'; inp.accept='.json';
  inp.onchange = function(){
    var file = inp.files[0]; if(!file) return;
    var reader = new FileReader();
    reader.onload = function(e){
      try{
        var data = JSON.parse(e.target.result);
        // Validação básica
        if(!data.db || !data.db.patients){
          alert('❌ Arquivo inválido. Selecione um backup gerado por este sistema.');
          return;
        }
        // Restaura db principal
        db = data.db;
        localStorage.setItem('bv_db', JSON.stringify(db));
        // Restaura fotos
        if(data.photos){
          Object.keys(data.photos).forEach(function(k){
            try{ localStorage.setItem(k, JSON.stringify(data.photos[k])); }catch(ex){}
          });
        }
        // Recarrega interface
        curPid = null; curCond = null; curEid = null;
        renderList();
        document.getElementById('mainArea').innerHTML = '<div style="padding:40px;text-align:center;color:#9a9a90"><div style="font-size:48px">✅</div><h3 style="margin-top:12px">Dados importados com sucesso!</h3><p style="font-size:13px;margin-top:8px">' + (data.db.patients ? data.db.patients.length : 0) + ' paciente(s) restaurado(s)</p></div>';
        alert('✅ Importação concluída!\n' + (data.db.patients ? data.db.patients.length : 0) + ' paciente(s) restaurado(s).');
      }catch(err){
        alert('❌ Erro ao importar: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(inp);
  inp.click();
  document.body.removeChild(inp);
}

function getChips(ev){
  const d=ev.data||{};let h='';
  if(d.hy)h+='<div class="sc"><div class="sc-v">'+d.hy.charAt(0)+'</div><div class="sc-l">H&Y</div></div>';
  if(d.berg_total||d.updrs3_total)h+='<div class="sc"><div class="sc-v">'+(d.berg_total||'—')+'</div><div class="sc-l">Berg</div></div>';
  if(d.tug_media)h+='<div class="sc"><div class="sc-v">'+d.tug_media+'s</div><div class="sc-l">TUG</div></div>';
  if(d.updrs3_total)h+='<div class="sc"><div class="sc-v">'+d.updrs3_total+'</div><div class="sc-l">UPDRS III</div></div>';
  if(d.pdq39_si)h+='<div class="sc"><div class="sc-v">'+d.pdq39_si+'%</div><div class="sc-l">PDQ-SI</div></div>';
  return h;
}

function recalcAll(){
  calcTUG();
  ['updrs3','berg','mbt','moca_pk','meem_pk'].forEach(sfx=>calcSG(sfx));
  const t1=parseFloat(document.querySelector('[data-key="tc10_h1"]')?.value);
  const t2=parseFloat(document.querySelector('[data-key="tc10_h2"]')?.value);
  const tv=[t1,t2].filter(v=>!isNaN(v));
  const ti=document.getElementById('tc10_pk');
  if(tv.length&&ti)ti.value=(10/(tv.reduce((a,b)=>a+b,0)/tv.length)).toFixed(3);
  const pdqk=['pdq_mob','pdq_avd','pdq_bem','pdq_est','pdq_soc','pdq_cogn','pdq_com','pdq_desc'];
  const pv=pdqk.map(k=>parseFloat(document.querySelector('[data-key="'+k+'"]')?.value)).filter(v=>!isNaN(v));
  const pi=document.getElementById('pdq_pk');if(pv.length&&pi)pi.value=(pv.reduce((a,b)=>a+b,0)/pv.length).toFixed(1);
  const uk=['updrs3_total','updrs1','updrs2','updrs4'];
  const ui=document.getElementById('updrs_tot_out');
  if(ui)ui.value=uk.map(k=>parseFloat(document.querySelector('[data-key="'+k+'"]')?.value)||0).reduce((a,b)=>a+b,0);
}
function calcSG(sfx){
  const els=document.querySelectorAll('.sc_'+sfx);
  if(!els.length)return;
  let total=0,max=0;
  els.forEach(el=>{total+=parseFloat(el.value)||0;max+=parseInt(el.getAttribute('max'))||0;});
  const d=document.getElementById('at_'+sfx),i=document.getElementById('athi_'+sfx);
  if(d)d.textContent=total+' / '+max;
  if(i){i.value=total;
    const named=document.querySelector('[data-key="'+sfx+'_total"]');
    if(named&&named!==i)named.value=total;
  }
  if(sfx==='updrs3'){const u3=document.querySelector('[data-key="updrs3_total"]');if(u3)u3.value=total;}
  if(sfx==='berg'){
    const bt=document.querySelector('[data-key="berg_total"]');if(bt)bt.value=total;
    const bd=document.getElementById('bt_pk');if(bd)bd.textContent=total+' / 56';
    const bi=document.getElementById('bti_pk');if(bi)bi.value=total;
  }
  if(sfx==='moca_pk'){const mc=document.querySelector('[data-key="moca"]');if(mc&&!mc.value)mc.value=total;}
  if(sfx==='meem_pk'){const mm=document.querySelector('[data-key="meem"]');if(mm)mm.value=total;}
  schedSave();
}
document.addEventListener('input',function(e){
  const sfx=Array.from(e.target.classList||[]).find(c=>c.startsWith('sc_'));
  if(sfx)calcSG(sfx.replace('sc_',''));
  const k=e.target.getAttribute('data-key');
  if(k==='tc10_h1'||k==='tc10_h2'){
    const t1=parseFloat(document.querySelector('[data-key="tc10_h1"]')?.value);
    const t2=parseFloat(document.querySelector('[data-key="tc10_h2"]')?.value);
    const tv=[t1,t2].filter(v=>!isNaN(v));
    const ti=document.getElementById('tc10_pk');
    if(tv.length&&ti){ti.value=(10/(tv.reduce((a,b)=>a+b,0)/tv.length)).toFixed(3);schedSave();}
  }
  const pdqk=['pdq_mob','pdq_avd','pdq_bem','pdq_est','pdq_soc','pdq_cogn','pdq_com','pdq_desc'];
  if(pdqk.includes(k)){
    const pv=pdqk.map(k=>parseFloat(document.querySelector('[data-key="'+k+'"]')?.value)).filter(v=>!isNaN(v));
    const pi=document.getElementById('pdq_pk');
    if(pv.length&&pi){pi.value=(pv.reduce((a,b)=>a+b,0)/pv.length).toFixed(1);schedSave();}
  }
  const uk=['updrs3_total','updrs1','updrs2','updrs4'];
  if(uk.includes(k)){
    const ui=document.getElementById('updrs_tot_out');
    if(ui)ui.value=uk.map(k=>parseFloat(document.querySelector('[data-key="'+k+'"]')?.value)||0).reduce((a,b)=>a+b,0);

  if(named&&named!==i)named.value=total;

function recalcAll(){
  calcTUG();
  ['meem_alz','moca_alz','barthel_alz','berg'].forEach(sfx=>calcSG(sfx));
  const bk=['b_ali','b_ban','b_hig','b_vest','b_int','b_ves','b_toil','b_cad','b_dea','b_esc'];
  const bv=bk.map(k=>parseFloat(document.querySelector('[data-key="'+k+'"]')?.value)||0).reduce((a,b)=>a+b,0);
  const bo=document.getElementById('barthel_alz_out');if(bo)bo.value=bv;
  const mo=document.getElementById('meem_alz_out');
  const mk=['meem_ot','meem_oe','meem_reg','meem_at','meem_evoc','meem_ling','meem_prax'];
  const mv=mk.map(k=>parseFloat(document.querySelector('[data-key="'+k+'"]')?.value)||0).reduce((a,b)=>a+b,0);
  if(mo)mo.value=mv;
  const meemF=document.querySelector('[data-key="meem"]');if(meemF)meemF.value=mv;
  const pv=parseFloat(document.querySelector('[data-key="poma_eq"]')?.value)||0;
  const pm=parseFloat(document.querySelector('[data-key="poma_marcha"]')?.value)||0;
  const po=document.getElementById('poma_out');if(po)po.value=pv+pm;
}
document.addEventListener('input',function(e){
  const sfx=Array.from(e.target.classList||[]).find(c=>c.startsWith('sc_'));
  if(sfx)calcSG(sfx.replace('sc_',''));
  const k=e.target.getAttribute('data-key');
  const mk=['meem_ot','meem_oe','meem_reg','meem_at','meem_evoc','meem_ling','meem_prax'];
  if(mk.includes(k)){
    const mv=mk.map(k=>parseFloat(document.querySelector('[data-key="'+k+'"]')?.value)||0).reduce((a,b)=>a+b,0);
    const mo=document.getElementById('meem_alz_out');if(mo)mo.value=mv;
    const mf=document.querySelector('[data-key="meem"]');if(mf)mf.value=mv;
    schedSave();
  }
  if(k==='poma_eq'||k==='poma_marcha'){
    const pv=parseFloat(document.querySelector('[data-key="poma_eq"]')?.value)||0;
    const pm=parseFloat(document.querySelector('[data-key="poma_marcha"]')?.value)||0;
    const po=document.getElementById('poma_out');if(po)po.value=pv+pm;schedSave();

function calcSG(sfx){
  const els=document.querySelectorAll('.sc_'+sfx);
  if(!els.length)return;
  let total=0,max=0;
  els.forEach(el=>{total+=parseFloat(el.value)||0;max+=parseInt(el.getAttribute('max'))||0;});
  const d=document.getElementById('at_'+sfx),i=document.getElementById('athi_'+sfx);
  if(d)d.textContent=total+' / '+max;
  if(i)i.value=total;
  const named=document.querySelector('[data-key="'+sfx+'_total"]');
  if(named&&named!==i)named.value=total;
  if(sfx==='berg'){
    const bt=document.querySelector('[data-key="berg_total"]');if(bt)bt.value=total;
  }
  schedSave();
}

function getChips(ev){

  if(d.mrs)h+='<div class="sc"><div class="sc-v">'+d.mrs.charAt(0)+'</div><div class="sc-l">mRS</div></div>';
  if(d.barthel)h+='<div class="sc"><div class="sc-v">'+d.barthel+'</div><div class="sc-l">Barthel</div></div>';
  if(d.berg_total)h+='<div class="sc"><div class="sc-v">'+d.berg_total+'</div><div class="sc-l">Berg</div></div>';
  if(d.fm_motor)h+='<div class="sc"><div class="sc-v">'+d.fm_motor+'</div><div class="sc-l">Fugl-M.</div></div>';
  return h;
}

  if(named&&named!==i)named.value=total;

function how(t){return '<div class="how-to">'+t+'</div>';}
function sbx(key,label,max,sfx){
  return '<div class="sbox"><div class="sbox-lbl">'+label+'</div>'
    +'<input type="number" class="sbox-inp sc_'+sfx+'" data-key="'+key+'" min="0" max="'+max+'" placeholder="0">'
    +'<div class="sbox-max">/'+max+'</div></div>';
}
function sgrid(items,sfx,cols){
  let h='<div class="sg sg-'+(cols||3)+'">';
  items.forEach(function(it){h+=sbx(it[0],it[1],it[2],sfx);});
  return h+'</div>';
}
function atbar(sfx,label,max){
  return '<div class="tbar" style="margin-top:4px"><span>'+label+'</span><span id="at_'+sfx+'">0 / '+max+'</span></div>'
    +'<input type="hidden" id="athi_'+sfx+'" data-key="'+sfx+'_total">';
}
function calcSG(sfx){
  const els=document.querySelectorAll('.sc_'+sfx);
  if(!els.length)return;
  let total=0,max=0;
  els.forEach(el=>{total+=parseFloat(el.value)||0;max+=parseInt(el.getAttribute('max'))||0;});
  const d=document.getElementById('at_'+sfx),i=document.getElementById('athi_'+sfx);
  if(d)d.textContent=total+' / '+max;
  if(i)i.value=total;
  const named=document.querySelector('[data-key="'+sfx+'_total"]');
  if(named&&named!==i)named.value=total;
  if(sfx==='berg'){const bt=document.querySelector('[data-key="berg_total"]');if(bt)bt.value=total;}
  schedSave();
}
document.addEventListener('input',function(e){
  const sfx=Array.from(e.target.classList||[]).find(c=>c.startsWith('sc_'));
  if(sfx)calcSG(sfx.replace('sc_',''));
});

function how(t){return '<div class="how-to">'+t+'</div>';}
function sbx(key,label,max,sfx){
  return '<div class="sbox"><div class="sbox-lbl">'+label+'</div>'
    +'<input type="number" class="sbox-inp sc_'+sfx+'" data-key="'+key+'" min="0" max="'+max+'" placeholder="0">'

function calcSG(sfx){
  const els=document.querySelectorAll('.sc_'+sfx);
  if(!els.length)return;
  let total=0,max=0;
  els.forEach(el=>{total+=parseFloat(el.value)||0;max+=parseInt(el.getAttribute('max'))||0;});
  const d=document.getElementById('at_'+sfx),i=document.getElementById('athi_'+sfx);
  if(d)d.textContent=total+' / '+max;
  if(i)i.value=total;
  const named=document.querySelector('[data-key="'+sfx+'_total"]');
  if(named&&named!==i)named.value=total;
  schedSave();
}

var painCanvas=null,painCtx=null,paintMode='red',isDrawing=false;
function initPainMap(){
  const canvas=document.getElementById('painCanvas');
  if(!canvas||canvas._init)return;
  canvas._init=true;
  painCanvas=canvas;painCtx=canvas.getContext('2d');
  canvas.width=300;canvas.height=420;
  painCtx.fillStyle='#F9F9F7';painCtx.fillRect(0,0,300,420);
  drawBodyOutline();
  ['mousedown','touchstart'].forEach(ev=>canvas.addEventListener(ev,startDraw,{passive:false}));
  ['mousemove','touchmove'].forEach(ev=>canvas.addEventListener(ev,draw,{passive:false}));
  ['mouseup','touchend'].forEach(ev=>canvas.addEventListener(ev,stopDraw));
  loadPainMap();
}
function drawBodyOutline(){
  painCtx.strokeStyle='#BBBBAA';painCtx.lineWidth=1.5;
  painCtx.beginPath();painCtx.arc(150,50,30,0,Math.PI*2);painCtx.stroke();
  painCtx.beginPath();painCtx.moveTo(150,80);painCtx.lineTo(150,220);painCtx.stroke();
  painCtx.beginPath();painCtx.moveTo(150,100);painCtx.lineTo(100,180);painCtx.stroke();
  painCtx.beginPath();painCtx.moveTo(150,100);painCtx.lineTo(200,180);painCtx.stroke();
  painCtx.beginPath();painCtx.moveTo(150,220);painCtx.lineTo(120,320);painCtx.stroke();
  painCtx.beginPath();painCtx.moveTo(150,220);painCtx.lineTo(180,320);painCtx.stroke();
  painCtx.beginPath();painCtx.moveTo(120,320);painCtx.lineTo(110,390);painCtx.stroke();
  painCtx.beginPath();painCtx.moveTo(180,320);painCtx.lineTo(190,390);painCtx.stroke();
  painCtx.font='10px DM Sans';painCtx.fillStyle='#9A9A90';
  painCtx.fillText('Anterior',10,15);painCtx.fillText('Direito →',210,15);
}
function setPaintMode(mode,btn){
  paintMode=mode;
  document.querySelectorAll('.pain-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function getPos(e,canvas){
  const r=canvas.getBoundingClientRect();
  const scaleX=canvas.width/r.width,scaleY=canvas.height/r.height;
  const touch=e.touches?e.touches[0]:e;
  return{x:(touch.clientX-r.left)*scaleX,y:(touch.clientY-r.top)*scaleY};
}
function startDraw(e){e.preventDefault();isDrawing=true;const p=getPos(e,painCanvas);drawDot(p.x,p.y);}
function draw(e){e.preventDefault();if(!isDrawing)return;const p=getPos(e,painCanvas);drawDot(p.x,p.y);}
function stopDraw(){isDrawing=false;savePainMap();}
function drawDot(x,y){
  if(paintMode==='erase'){painCtx.clearRect(x-12,y-12,24,24);drawBodyOutline();return;}
  painCtx.beginPath();
  painCtx.arc(x,y,6,0,Math.PI*2);
  painCtx.fillStyle=paintMode==='red'?'rgba(220,50,50,0.6)':paintMode==='blue'?'rgba(50,100,220,0.5)':'rgba(255,150,0,0.6)';
  painCtx.fill();
}
function clearPainMap(){if(painCtx){painCtx.clearRect(0,0,300,420);painCtx.fillStyle='#F9F9F7';painCtx.fillRect(0,0,300,420);drawBodyOutline();savePainMap();}}
function savePainMap(){
  const p=db.patients.find(p=>p.id===curPid),ev=p&&(p.condEvals&&p.condEvals[curCond]||[]).find(e=>e.id===curEid);
  if(ev&&painCanvas)ev.data.pain_map=painCanvas.toDataURL('image/png',0.7);
  schedSave();
}
function loadPainMap(){
  const p=db.patients.find(p=>p.id===curPid),ev=p&&(p.condEvals&&p.condEvals[curCond]||[]).find(e=>e.id===curEid);
  if(ev&&ev.data.pain_map&&painCanvas){const img=new Image();img.onload=()=>painCtx.drawImage(img,0,0);img.src=ev.data.pain_map;}
}

  ['wpi','ss'].forEach(sfx=>calcSG(sfx));
  const wpi=parseFloat(document.querySelector('[data-key="wpi_total"]')?.value)||0;
  const ss=parseFloat(document.querySelector('[data-key="ss_total"]')?.value)||0;
  const wo=document.getElementById('wpi_out'),so=document.getElementById('ss_out');
  if(wo)wo.value=wpi;if(so)so.value=ss;

// Called when a region dropdown changes
window.onRegiaoChange=function(n){
  var sel=document.getElementById('tr_reg'+n);
  if(!sel)return;
  var reg=sel.value;
  // show/hide ADM and tests blocks
  var admEl=document.getElementById('tr_adm'+n);
  var tstEl=document.getElementById('tr_tst'+n);
  if(admEl)admEl.style.display=reg?'block':'none';
  if(tstEl)tstEl.style.display=reg?'block':'none';
  // show correct tests
  if(tstEl){
    tstEl.querySelectorAll('.tr-testes').forEach(function(d){
      d.style.display=(d.getAttribute('data-regiao-testes')===reg)?'block':'none';
    });
  }
};

// Show/hide region 2 and 3 based on checkbox
window.toggleRegiao=function(n){
  var cb=document.getElementById('cb_reg'+n);
  var blk=document.getElementById('trb'+n);
  if(!blk)return;
  blk.style.display=(cb&&cb.checked)?'block':'none';
  if(cb&&!cb.checked){
    // reset dropdown
    var sel=document.getElementById('tr_reg'+n);
    if(sel)sel.value='';
    onRegiaoChange(n);
  }
};

function calcGMFM(){
  var dims=[{k:'gmfm_a',max:51},{k:'gmfm_b',max:60},{k:'gmfm_c',max:42},{k:'gmfm_d',max:39},{k:'gmfm_e',max:72}];
  var letters=['a','b','c','d','e'];
  var pcts=[];
  dims.forEach(function(d,i){
    var inp=document.querySelector('[data-key="'+d.k+'"]');
    var pctEl=document.querySelector('[data-key="gmfm_pct_'+letters[i]+'"]');
    if(inp&&pctEl){
      var v=parseFloat(inp.value)||0;
      var p=Math.round(v/d.max*100);
      pctEl.value=p+'%';
      pcts.push(p);
    }
  });
  var tot=document.querySelector('[data-key="gmfm_total"]');
  if(tot&&pcts.length===5) tot.value=(pcts.reduce(function(a,b){return a+b;},0)/5).toFixed(1)+'%';

function contarAvisos(){
  var hoje=new Date().toISOString().split('T')[0];
  var appts=db.appointments||[];
  var evols=db.evolutions||[];
  var pags=db.pagamentos||[];
  // Consultas sem evolução hoje ou passadas
  var semEvol=appts.filter(function(a){
    if(a.date>hoje)return false;
    var temEvol=evols.some(function(e){return e.patientId===a.patientId&&e.date===a.date;});
    return !temEvol;
  }).length;
  // Pagamentos pendentes
  var pendentes=pags.filter(function(p){return p.status==='Pendente';}).length;
  return semEvol+pendentes;
}

  var btn=document.getElementById('btnAvisos');

  var n=contarAvisos();
