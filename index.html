  var r=document.querySelector('[data-key="berg_risco"]');
  if(t) t.value=total;
  if(r) r.value=total>=45?'Baixo risco':total>=36?'Risco moderado':'Alto risco';
}
window.calcBerg=calcBerg;

function calcTUG(){
  var t1=parseFloat((document.querySelector('[data-key="tug_1"]')||{}).value)||0;
  var t2=parseFloat((document.querySelector('[data-key="tug_2"]')||{}).value)||0;
  var med=t1&&t2?((t1+t2)/2).toFixed(1):t1||t2;
  var mEl=document.querySelector('[data-key="tug_med"]');
  var cEl=document.querySelector('[data-key="tug_class"]');
  if(mEl) mEl.value=med;
  if(cEl&&med){
    cEl.value=med<10?'Normal':med<20?'Independente com risco':med<30?'Dependência parcial':'Dependência total';
  }
}
window.calcTUG=calcTUG;

// Auto-calc TUG when inputs change
document.addEventListener('input',function(e){
  if(e.target&&(e.target.dataset.key==='tug_1'||e.target.dataset.key==='tug_2')) calcTUG();
});

function calcDASH(){
  var soma=parseFloat((document.querySelector('[data-key="dash_soma"]')||{}).value)||0;
  var sEl=document.querySelector('[data-key="dash_score"]');
  if(sEl&&soma>=30) sEl.value=((soma/30-1)*25).toFixed(1);
  var ts=parseFloat((document.querySelector('[data-key="dash_trab_soma"]')||{}).value)||0;
  var tsEl=document.querySelector('[data-key="dash_trab_score"]');
  if(tsEl&&ts>=4) tsEl.value=((ts/4-1)*25).toFixed(1);
  var es=parseFloat((document.querySelector('[data-key="dash_esp_soma"]')||{}).value)||0;
  var esEl=document.querySelector('[data-key="dash_esp_score"]');
  if(esEl&&es>=4) esEl.value=((es/4-1)*25).toFixed(1);
}
window.calcDASH=calcDASH;

function calcWOMAC(){
  var d=parseFloat((document.querySelector('[data-key="womac_dor"]')||{}).value)||0;
  var r=parseFloat((document.querySelector('[data-key="womac_rig"]')||{}).value)||0;

  var tEl=document.querySelector('[data-key="womac_total"]');

}

function contarAvisos(){
  var hoje=new Date().toISOString().split('T')[0];
  var appts=db.appointments||[];
  var evols=db.evolutions||[];
  var pags=db.pagamentos||[];
  // Consultas sem evolução hoje ou passadas
  var semEvol=appts.filter(function(a){
    if(a.date>hoje)return false;
    var temEvol=evols.some(function(e){return e.patientId===a.patientId&&e.date===a.date;});
    return !temEvol;
  }).length;
  // Pagamentos pendentes
  var pendentes=pags.filter(function(p){return p.status==='Pendente';}).length;
  return semEvol+pendentes;
}

function atualizarBadgeAvisos(){
  var btn=document.getElementById('btnAvisos');
  if(!btn)return;
  var n=contarAvisos();
  var lbl=btn.querySelector('.hdr-lbl');
  if(n>0){
    btn.style.background='var(--or)';
    btn.style.color='#fff';
    btn.style.borderColor='var(--ac)';
    if(lbl)lbl.textContent=' Avisos ('+n+')';
  } else {
    btn.style.background='';btn.style.color='';btn.style.borderColor='';
    if(lbl)lbl.textContent=' Avisos';
  }
}

function sendWhatsAppAviso(phone,nome){
  if(!phone){toast('Paciente sem telefone','err');return;}
  var clean=phone.replace(/\D/g,'');
  if(!clean.startsWith('55'))clean='55'+clean;
  var msg='Olá, '+nome+'! 😊\n\n*Bianca Viniski Fisioterapia*\nGostaríamos de registrar a evolução da sua sessão.\nPor favor, confirme seu comparecimento ou entre em contato conosco.\n\n📞 (81) 99615-0609';
  window.open('https://wa.me/'+clean+'?text='+encodeURIComponent(msg),'_blank');
}

function sendWhatsAppCobranca(phone,nome,valor,tipo){
  if(!phone){toast('Paciente sem telefone','err');return;}
  var clean=phone.replace(/\D/g,'');
  if(!clean.startsWith('55'))clean='55'+clean;
  var msg='Olá, '+nome+'! 😊\n\n*Bianca Viniski Fisioterapia*\nPassando para lembrar sobre o pagamento pendente:\n\n💰 Valor: R$ '+parseFloat(valor||0).toFixed(2).replace('.',',')+'\n📋 Referente: '+tipo+'\n\nFique à vontade para realizar o pagamento via Pix ou entrar em contato.\n\n📞 (81) 99615-0609';
  window.open('https://wa.me/'+clean+'?text='+encodeURIComponent(msg),'_blank');
}

function cobrarTodos(){
  var pags=(db.pagamentos||[]).filter(function(p){return p.status==='Pendente';});
  var pts=db.patients||[];
  var enviados=0;
  pags.forEach(function(p){
    var pt=pts.find(function(x){return x.id===p.patientId;});
    if(pt&&pt.phone){
      var clean=pt.phone.replace(/\D/g,'');
      if(!clean.startsWith('55'))clean='55'+clean;
      var msg='Olá, '+p.patient+'! 😊\n\n*Bianca Viniski Fisioterapia*\nPassando para lembrar sobre o pagamento pendente:\n\n💰 Valor: R$ '+parseFloat(p.valor||0).toFixed(2).replace('.',',')+'\n📋 Referente: '+p.tipo+'\n\nFique à vontade para realizar o pagamento via Pix ou entrar em contato.\n\n📞 (81) 99615-0609';
      setTimeout(function(){window.open('https://wa.me/'+clean+'?text='+encodeURIComponent(msg),'_blank');},enviados*500);
      enviados++;
    }
  });
  if(enviados===0)toast('Nenhum paciente com telefone cadastrado','err');
  else toast(enviados+' mensagem(ns) enviada(s)!','ok');
}

function showRelatorioFrequencia(){
  var hoje=new Date();
  var mesAtual=hoje.getMonth();
  var anoAtual=hoje.getFullYear();
  var mesStr=String(mesAtual+1).padStart(2,'0');
  var anoMes=anoAtual+'-'+mesStr;
  var nomes=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  var appts=(db.appointments||[]).filter(function(a){return a.date&&a.date.substring(0,7)===anoMes;});

  // Agrupar por paciente
  var porPaciente={};
  appts.forEach(function(a){
    var k=a.patientId;
    if(!porPaciente[k]){porPaciente[k]={nome:a.patient,total:0,realizadas:0,pendentes:0};}
    porPaciente[k].total++;
    var temEvol=(db.evolutions||[]).some(function(e){return e.patientId===a.patientId&&e.date===a.date;});
    if(temEvol) porPaciente[k].realizadas++;
    else porPaciente[k].pendentes++;
  });

  var totalSessoes=appts.length;
  var totalRealizadas=Object.values(porPaciente).reduce(function(s,p){return s+p.realizadas;},0);
  var taxa=totalSessoes>0?Math.round(totalRealizadas/totalSessoes*100):0;

  var html='<div style="padding:16px;max-width:900px;margin:0 auto">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
    +'<h2 style="margin:0;font-size:18px;color:var(--g8)">📈 Frequência — '+nomes[mesAtual]+' '+anoAtual+'</h2>'
    +'<button class="btn" style="background:var(--or);color:#fff;font-size:12px" onclick="exportarFrequenciaPDF()">📄 Exportar PDF</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">'
    +'<div style="background:#edfdf5;border-radius:12px;padding:14px;text-align:center">'
    +'<div style="font-size:26px;font-weight:700;color:#1a7a4a">'+totalRealizadas+'</div>'
    +'<div style="font-size:11px;color:#1a7a4a;font-weight:600">Sessões Realizadas</div>'
    +'</div>'
    +'<div style="background:#fff8f0;border-radius:12px;padding:14px;text-align:center">'
    +'<div style="font-size:26px;font-weight:700;color:var(--ac)">'+totalSessoes+'</div>'
    +'<div style="font-size:11px;color:var(--ac);font-weight:600">Total Agendado</div>'
    +'</div>'
    +'<div style="background:var(--gr-p);border-radius:12px;padding:14px;text-align:center">'
    +'<div style="font-size:26px;font-weight:700;color:var(--g8)">'+taxa+'%</div>'
    +'<div style="font-size:11px;color:var(--g4);font-weight:600">Taxa de Comparecimento</div>'
    +'</div>'
    +'</div>';

  var keys=Object.keys(porPaciente);
  if(keys.length===0){
    html+='<div style="text-align:center;padding:40px;color:var(--g4)">Nenhuma consulta agendada neste mês.</div>';
  } else {
    html+='<div style="background:var(--w);border-radius:12px;border:1px solid var(--g2);overflow:hidden">'
      +'<table style="width:100%;border-collapse:collapse;font-size:12px">'
      +'<thead><tr style="background:var(--gr-p)">'
      +'<th style="padding:10px 14px;text-align:left;color:var(--g8)">Paciente</th>'
      +'<th style="padding:10px 14px;text-align:center;color:var(--g8)">Agendadas</th>'
      +'<th style="padding:10px 14px;text-align:center;color:var(--g8)">Realizadas</th>'
      +'<th style="padding:10px 14px;text-align:center;color:var(--g8)">Pendentes</th>'
      +'<th style="padding:10px 14px;text-align:center;color:var(--g8)">Taxa</th>'
      +'</tr></thead><tbody>';
    keys.forEach(function(k){
      var p=porPaciente[k];
      var t=p.total>0?Math.round(p.realizadas/p.total*100):0;
      var cor=t>=80?'#1a7a4a':t>=50?'var(--ac)':'#C62828';
      html+='<tr style="border-top:1px solid var(--g1)">'
        +'<td style="padding:10px 14px;font-weight:600;color:var(--g8)">'+p.nome+'</td>'
        +'<td style="padding:10px 14px;text-align:center;color:var(--g8)">'+p.total+'</td>'
        +'<td style="padding:10px 14px;text-align:center;color:#1a7a4a;font-weight:600">'+p.realizadas+'</td>'
        +'<td style="padding:10px 14px;text-align:center;color:var(--ac)">'+p.pendentes+'</td>'
        +'<td style="padding:10px 14px;text-align:center;font-weight:700;color:'+cor+'">'+t+'%</td>'
        +'</tr>';
    });
    html+='</tbody></table></div>';
  }
  html+='</div>';
  document.getElementById('mainArea').innerHTML=html;
}

function renderPagamentos(ano,mes){
  if(!db.pagamentos)db.pagamentos=[];
  var nomes=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var mesStr=String(mes+1).padStart(2,'0');
  var anoMes=ano+'-'+mesStr;

  var pgsMes=db.pagamentos.filter(function(p){return p.data&&p.data.substring(0,7)===anoMes;});
  var totalRecebido=pgsMes.filter(function(p){return p.status==='Pago';}).reduce(function(s,p){return s+(parseFloat(p.valor)||0);},0);
  var totalPendente=pgsMes.filter(function(p){return p.status==='Pendente';}).reduce(function(s,p){return s+(parseFloat(p.valor)||0);},0);
  var totalMes=pgsMes.reduce(function(s,p){return s+(parseFloat(p.valor)||0);},0);

  // Agrupar por paciente
  var porPaciente={};
  pgsMes.forEach(function(p){
    var k=p.patientId||p.patient;
    if(!porPaciente[k])porPaciente[k]={nome:p.patient,itens:[],recebido:0,pendente:0};
    porPaciente[k].itens.push(p);
    if(p.status==='Pago')porPaciente[k].recebido+=(parseFloat(p.valor)||0);
    else porPaciente[k].pendente+=(parseFloat(p.valor)||0);
  });

  var html='<div style="padding:16px;max-width:900px;margin:0 auto">';

  // Navegação de mês
  var prevMes=mes===0?11:mes-1; var prevAno=mes===0?ano-1:ano;
  var nextMes=mes===11?0:mes+1; var nextAno=mes===11?ano+1:ano;
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
    +'<button class="btn" style="background:#ede8e0;color:#1a1a14" onclick="renderPagamentos('+prevAno+','+prevMes+')">◀</button>'
    +'<h2 style="margin:0;font-size:18px;color:var(--g8)">💰 Pagamentos — '+nomes[mes]+' '+ano+'</h2>'
    +'<button class="btn" style="background:#ede8e0;color:#1a1a14" onclick="renderPagamentos('+nextAno+','+nextMes+')">▶</button>'
    +'</div>';

  // Cards de resumo
  html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">'
    +'<div style="background:var(--gr-p);border-radius:12px;padding:16px;text-align:center">'
    +'<div style="font-size:11px;color:var(--gr2);font-weight:600;text-transform:uppercase;letter-spacing:.5px">Total do Mês</div>'
    +'<div style="font-size:24px;font-weight:700;color:var(--g8);margin-top:4px">R$ '+totalMes.toFixed(2).replace('.',',')+'</div>'
    +'</div>'
    +'<div style="background:#edfdf5;border-radius:12px;padding:16px;text-align:center">'
    +'<div style="font-size:11px;color:#1a7a4a;font-weight:600;text-transform:uppercase;letter-spacing:.5px">✅ Recebido</div>'
    +'<div style="font-size:24px;font-weight:700;color:#1a7a4a;margin-top:4px">R$ '+totalRecebido.toFixed(2).replace('.',',')+'</div>'
    +'</div>'
    +'<div style="background:#fff8f0;border-radius:12px;padding:16px;text-align:center">'
    +'<div style="font-size:11px;color:var(--ac);font-weight:600;text-transform:uppercase;letter-spacing:.5px">⏳ Pendente</div>'
    +'<div style="font-size:24px;font-weight:700;color:var(--ac);margin-top:4px">R$ '+totalPendente.toFixed(2).replace('.',',')+'</div>'
    +'</div>'
    +'</div>';

  // Botões de ação
  html+='<div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">'
    +'<button class="btn" style="background:var(--or);color:#fff" onclick="openNovoPagamento()">＋ Novo Pagamento</button>'
    +'<button class="btn" style="background:var(--or);color:#fff" onclick="openNovaMensalidade()">📅 Mensalidade em Lote</button>'
    +'<button class="btn" style="background:#edfdf5;color:#1a7a4a" onclick="exportarPagamentosPDF('+ano+','+mes+')">📄 Exportar PDF</button>'
    +'</div>';

  // Lista por paciente
  var keys=Object.keys(porPaciente);
  if(keys.length===0){
    html+='<div style="text-align:center;padding:40px;color:var(--g4)">Nenhum pagamento registrado neste mês.</div>';
  } else {
    keys.forEach(function(k){
      var pg=porPaciente[k];
      html+='<div style="background:var(--w);border-radius:12px;border:1px solid var(--g2);margin-bottom:12px;overflow:hidden">';
      html+='<div style="padding:12px 16px;background:var(--gr-p);display:flex;justify-content:space-between;align-items:center">'
        +'<span style="font-weight:700;color:var(--g8)">'+pg.nome+'</span>'
        +'<span style="font-size:12px;color:#1a7a4a">✅ R$ '+pg.recebido.toFixed(2).replace('.',',')
        +(pg.pendente>0?' &nbsp;⏳ R$ '+pg.pendente.toFixed(2).replace('.',','):'')+'</span>'
        +'</div>';
      pg.itens.sort(function(a,b){return a.data.localeCompare(b.data);}).forEach(function(item){
        var statusColor=item.status==='Pago'?'#1a7a4a':'var(--ac)';
        var statusBg=item.status==='Pago'?'#edfdf5':'#fff8f0';
        var d=item.data?item.data.split('-').reverse().join('/'):'—';
        html+='<div style="padding:10px 16px;border-top:1px solid var(--g1);display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
          +'<span style="font-size:12px;color:var(--g4);min-width:70px">'+d+'</span>'
          +'<span style="flex:1;font-size:13px;color:var(--g8)">'+item.tipo+'</span>'
          +'<span style="font-size:13px;font-weight:600;color:var(--g8);min-width:80px;text-align:right">R$ '+parseFloat(item.valor).toFixed(2).replace('.',',')+'</span>'
          +'<span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:'+statusBg+';color:'+statusColor+'">'+item.status+'</span>'
          +'<span style="font-size:11px;color:var(--g4)">'+item.forma+'</span>'
          +'<div style="display:flex;gap:4px">'
          +(item.status==='Pendente'?'<button class="btn" style="background:#edfdf5;color:#1a7a4a;font-size:10px;padding:3px 7px" onclick="marcarPago('+item.id+','+ano+','+mes+')">✅ Pago</button>':'')
          +'<button class="btn" style="background:#ede8e0;color:var(--g6);font-size:10px;padding:3px 7px" onclick="editarPagamento('+item.id+','+ano+','+mes+')">✏️</button>'
          +'<button class="btn btn-del" style="font-size:10px;padding:3px 7px" onclick="deletarPagamento('+item.id+','+ano+','+mes+')">🗑</button>'
          +'</div>'
          +'</div>';
      });
      html+='</div>';
    });
  }

  html+='</div>';
  document.getElementById('mainArea').innerHTML=html;
}

function salvarPagamento(){
  var ptId=parseInt(document.getElementById('pag_patient').value);
  if(!ptId){toast('Selecione um paciente','err');return;}
  var valor=parseFloat(document.getElementById('pag_valor').value);
  if(!valor||valor<=0){toast('Informe um valor válido','err');return;}
  var pt=db.patients.find(function(p){return p.id===ptId;});
  if(!db.pagamentos)db.pagamentos=[];
  db.pagamentos.push({
    id:db.nid++,
    patientId:ptId,
    patient:pt?pt.name:'',
    data:document.getElementById('pag_data').value,
    valor:valor,
    tipo:document.getElementById('pag_tipo').value,
    forma:document.getElementById('pag_forma').value,
    status:document.getElementById('pag_status').value,
    obs:document.getElementById('pag_obs').value
  });
  saveDB();closeOv('pagModal');toast('Pagamento registrado!','ok');
  var d=document.getElementById('pag_data');
  var dd=d?new Date(d.value+'T12:00:00'):new Date();
  renderPagamentos(dd.getFullYear(),dd.getMonth());
}

function salvarMensalidade(){
  var selecionados=Array.from(document.querySelectorAll('.mens-pt:checked'));
  if(selecionados.length===0){toast('Selecione ao menos um paciente','err');return;}
  var valor=parseFloat(document.getElementById('pag_valor').value);
  if(!valor||valor<=0){toast('Informe um valor válido','err');return;}
  if(!db.pagamentos)db.pagamentos=[];
  var dataVal=document.getElementById('pag_data').value;
  var mesRef=document.getElementById('pag_mes').value;
  var forma=document.getElementById('pag_forma').value;

    var ptId=parseInt(el.value);

}

function marcarPago(id,ano,mes){
  var p=db.pagamentos&&db.pagamentos.find(function(x){return x.id===id;});
  if(!p)return;
  p.status='Pago';
  // Sincronizar com o agendamento correspondente
  if(p.apptId&&db.appointments){
    var a=db.appointments.find(function(x){return x.id===p.apptId;});
    if(a)a.pag_status='Pago';
  }
  saveDB();toast('Marcado como pago!','ok');
  renderPagamentos(ano,mes);
}

function atualizarPagamento(id,ano,mes){
  var p=db.pagamentos&&db.pagamentos.find(function(x){return x.id===id;});
  if(!p)return;
  var ptId=parseInt(document.getElementById('pag_patient').value);
  var pt=db.patients.find(function(pt){return pt.id===ptId;});
  p.patientId=ptId;p.patient=pt?pt.name:'';
  p.data=document.getElementById('pag_data').value;
  p.valor=parseFloat(document.getElementById('pag_valor').value);
  p.tipo=document.getElementById('pag_tipo').value;
  p.forma=document.getElementById('pag_forma').value;
  p.status=document.getElementById('pag_status').value;
  p.obs=document.getElementById('pag_obs').value;
  // Sincronizar com o agendamento correspondente
  if(p.apptId&&db.appointments){
    var a=db.appointments.find(function(x){return x.id===p.apptId;});
    if(a)a.pag_status=p.status;
  }
  saveDB();closeOv('pagModal');toast('Pagamento atualizado!','ok');
  renderPagamentos(ano,mes);
}

function deletarPagamento(id,ano,mes){
  if(!confirm('Remover este pagamento?'))return;
  db.pagamentos=db.pagamentos.filter(function(x){return x.id!==id;});
  saveDB();toast('Pagamento removido','ok');
  renderPagamentos(ano,mes);
}

function renderCalendar(year,month){
  if(!db.appointments)db.appointments=[];
  var monthNames=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var daysInMonth=new Date(year,month+1,0).getDate();
  var firstDay=new Date(year,month,1).getDay();
  var today=new Date();
  var todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

  // Helper: has evolution for an appointment (by patientId + date)
  function hasEvol(a){
    var p=db.patients&&db.patients.find(function(pt){return pt.id===a.patientId;});
    if(!p||!p.evolutions||!p.evolutions.length)return false;
    return p.evolutions.some(function(ev){return ev.date===a.date;});
  }
  // Helper: appointment is overdue (past) and no evolution
  function isOverdue(a){return a.date<todayStr&&!hasEvol(a);}

  var html='<div style="max-width:960px;margin:0 auto;padding:20px">';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">'
    +'<button class="btn btn-del" onclick="showWelcome()">← Voltar</button>'

function toggleRecurFields(){
  var chk=document.getElementById('appt_recur');
  var fields=document.getElementById('recurFields');
  fields.style.display=chk.checked?'block':'none';
  if(chk.checked) updateRecurPreview();
}
function updateRecurPreview(){
  var days=Array.from(document.querySelectorAll('.recur-day:checked')).map(function(c){return parseInt(c.value);});
  var weeks=parseInt(document.getElementById('appt_weeks').value)||12;
  var dateVal=document.getElementById('appt_date').value;
  var preview=document.getElementById('recurPreview');
  if(!dateVal||days.length===0){preview.style.display='none';return;}
  var count=0;
  var startDate=new Date(dateVal+'T12:00:00');
  var endDate=new Date(startDate);
  endDate.setDate(endDate.getDate()+weeks*7);
  var cur=new Date(startDate);
  while(cur<=endDate){
    if(days.indexOf(cur.getDay())!==-1) count++;
    cur.setDate(cur.getDate()+1);
  }
  var dayNames=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  var selectedNames=days.map(function(d){return dayNames[d];}).join(', ');
  preview.style.display='block';
  preview.innerHTML='📋 Serão criadas <strong>'+count+' consultas</strong> · '+selectedNames+' · por '+weeks+' semanas';
}

function saveAppointment(){
  var sel=document.getElementById('appt_patient');
  var ptId=parseInt(sel.value);
  if(!ptId){toast('Selecione um paciente','err');return;}
  var pt=db.patients.find(function(p){return p.id===ptId;});
  if(!db.appointments)db.appointments=[];
  if(!db.pagamentos)db.pagamentos=[];
  var dateVal=document.getElementById('appt_date').value;
  var timeVal=document.getElementById('appt_time').value;
  var typeVal=document.getElementById('appt_type').value;
  var obsVal=document.getElementById('appt_obs').value;
  var valorEl=document.getElementById('appt_valor');
  var formaEl=document.getElementById('appt_forma');
  var pagStatusEl=document.getElementById('appt_pag_status');
  var valor=valorEl?parseFloat(valorEl.value)||0:0;
  var forma=formaEl?formaEl.value:'';
  var pagStatus=pagStatusEl?pagStatusEl.value:'Pendente';
  var recurChk=document.getElementById('appt_recur');
  var isRecur=recurChk&&recurChk.checked;

  if(isRecur){
    var days=Array.from(document.querySelectorAll('.recur-day:checked')).map(function(c){return parseInt(c.value);});
    if(days.length===0){toast('Selecione ao menos um dia da semana','err');return;}
    var weeks=parseInt(document.getElementById('appt_weeks').value)||12;
    var recurId='recur_'+Date.now();
    var startDate=new Date(dateVal+'T12:00:00');
    var endDate=new Date(startDate);
    endDate.setDate(endDate.getDate()+weeks*7);
    var cur=new Date(startDate);
    var count=0;
    while(cur<=endDate){
      if(days.indexOf(cur.getDay())!==-1){
        var pad=function(n){return n<10?'0'+n:String(n);};
        var dStr=cur.getFullYear()+'-'+pad(cur.getMonth()+1)+'-'+pad(cur.getDate());
        var apptId=db.nid++;
        db.appointments.push({
          id:apptId,
          patientId:ptId,
          patient:pt?pt.name:'',
          phone:pt?pt.phone:'',
          date:dStr,
          time:timeVal,
          type:typeVal,
          obs:obsVal,
          valor:valor,
          forma:forma,
          pag_status:pagStatus,
          recurId:recurId
        });
        if(valor>0&&forma){
          db.pagamentos.push({
            id:db.nid++,
            patientId:ptId,
            patient:pt?pt.name:'',
            data:dStr,
            valor:valor,
            tipo:typeVal,
            forma:forma,
            status:pagStatus,
            obs:'Agendamento automático',
            apptId:apptId
          });
        }
        count++;
      }
      cur.setDate(cur.getDate()+1);
    }
    saveDB();closeOv('apptModal');
    toast(count+' consultas recorrentes criadas!','ok');
    var d=new Date(dateVal+'T12:00:00');
    renderCalendar(d.getFullYear(),d.getMonth());
  } else {
    var apptId2=db.nid++;
    var a={
      id:apptId2,
      patientId:ptId,
      patient:pt?pt.name:'',
      phone:pt?pt.phone:'',
      date:dateVal,
      time:timeVal,
      type:typeVal,
      obs:obsVal,
      valor:valor,
      forma:forma,
      pag_status:pagStatus
    };
    db.appointments.push(a);
    if(valor>0&&forma){
      db.pagamentos.push({
        id:db.nid++,
        patientId:ptId,
        patient:pt?pt.name:'',
        data:dateVal,
        valor:valor,
        tipo:typeVal,
        forma:forma,
        status:pagStatus,
        obs:'Agendamento automático',
        apptId:apptId2
      });
    }
    saveDB();closeOv('apptModal');
    toast('Consulta agendada!','ok');
    var d=new Date(a.date+'T12:00:00');
    renderCalendar(d.getFullYear(),d.getMonth());
  }
}

function updateAppointment(id){
  var a=db.appointments&&db.appointments.find(function(x){return x.id===id;});
  if(!a)return;
  var ptId=parseInt(document.getElementById('appt_patient').value);
  var pt=db.patients.find(function(p){return p.id===ptId;});
  a.patientId=ptId;a.patient=pt?pt.name:'';a.phone=pt?pt.phone:'';
  a.date=document.getElementById('appt_date').value;
  a.time=document.getElementById('appt_time').value;
  a.type=document.getElementById('appt_type').value;
  a.obs=document.getElementById('appt_obs').value;
  var valorEl=document.getElementById('appt_valor');
  var formaEl=document.getElementById('appt_forma');
  var pagStatusEl=document.getElementById('appt_pag_status');
  if(valorEl)a.valor=parseFloat(valorEl.value)||0;
  if(formaEl)a.forma=formaEl.value;
  if(pagStatusEl)a.pag_status=pagStatusEl.value;
  // Sincronizar com db.pagamentos
  if(a.pag_status&&db.pagamentos){
    var pag=db.pagamentos.find(function(p){return p.apptId===a.id;});
    if(pag)pag.status=a.pag_status;
  }
  saveDB();closeOv('apptModal');toast('Consulta atualizada!','ok');
  var d=new Date(a.date+'T12:00:00');
  renderCalendar(d.getFullYear(),d.getMonth());
}
function deleteAppointment(id){
  var a=db.appointments&&db.appointments.find(function(x){return x.id===id;});
  if(!a)return;
  if(a.recurId){
    var series=db.appointments.filter(function(x){return x.recurId===a.recurId;});
    var future=series.filter(function(x){return x.date>=new Date().toISOString().split('T')[0];});
    var msg='Excluir apenas esta consulta ou toda a série recorrente?\n\n(Esta série tem '+future.length+' consulta(s) futura(s))';
    var choice=confirm(msg+'\n\nOK = Excluir toda a série\nCancelar = Excluir só esta');
    if(choice){
      db.appointments=db.appointments.filter(function(x){return x.recurId!==a.recurId;});
      toast('Série inteira removida','ok');
    } else {
      db.appointments=db.appointments.filter(function(x){return x.id!==id;});
      toast('Consulta removida','ok');
    }
  } else {
    if(!confirm('Remover esta consulta?'))return;
    db.appointments=db.appointments.filter(function(x){return x.id!==id;});
    toast('Consulta removida','ok');
  }
  saveDB();showCalendar();
}

}

  var wurl='https://wa.me/'+clean+'?text='+encodeURIComponent(msg); window.open(wurl,'_blank')||(window.location.href=wurl);
}



// CARTILHA DOMICILIAR
var CARTILHA_DATA = JSON.parse('{"parkinson":{"titulo":"Doença de Parkinson","icone":"parcond1","cor":"#E8844A","resumo":"O Parkinson é uma doença neurológica crônica que afeta os movimentos. Com os cuidados certos em casa, é possível manter mais independência e segurança no dia a dia.","paciente":[{"icon":"walk","titulo":"Movimentar-se com segurança","texto":"Caminhe devagar e com passos largos. Ao virar, faça um arco amplo, nunca gire bruscamente. Use calçados fechados com solado antiderrapante."},{"icon":"chair","titulo":"Levantar da cadeira","texto":"Coloque os pés alinhados sob o joelho, incline o tronco para frente antes de empurrar com os braços para levantar. Nunca se levante de um salto."},{"icon":"bath","titulo":"Banho seguro","texto":"Use banco de banho e barras de apoio. O chão deve ter tapete antiderrapante. Prefira chuveiro com ducha móvel."},{"icon":"food","titulo":"Alimentação","texto":"Se houver engasgos, prefira alimentos pastosos e coma sentado, com o pescoço levemente inclinado para frente. Beba água com cuidado, pequenos goles."},{"icon":"pill","titulo":"Medicação","texto":"Tome os remédios nos horários marcados. A maioria dos medicamentos do Parkinson deve ser tomada com o estômago relativamente vazio para melhor efeito."},{"icon":"sleep","titulo":"Sono","texto":"Durma com a cama levemente inclinada. Se tiver dificuldade para se virar na cama, use lençóis de cetim para deslizar com mais facilidade."}],"cuidador":[{"titulo":"Comunicação","texto":"Fale de frente, devagar e em frases curtas. Dê tempo para a pessoa responder. Nunca termine as frases por ela."},{"titulo":"Prevenção de quedas","texto":"Remova tapetes soltos, fios e obstáculos no chão. Instale barras de apoio no banheiro e nos corredores. Mantenha boa iluminação, especialmente à noite."},{"titulo":"Episódios de congelamento (freezing)","texto":"Quando a pessoa travar ao caminhar: peça que olhe para um ponto à frente, marche no lugar ou siga uma faixa no chão. Nunca puxe pelo braço."},{"titulo":"Alterações cognitivas","texto":"Confusão e alucinações podem ocorrer. Mantenha rotina previsível, ambiente calmo e bem iluminado. Evite discutir com a pessoa sobre o que ela está vendo."},{"titulo":"Exercícios recomendados","texto":"Caminhada com passada longa, exercícios de voz (LSVT LOUD), treino de equilíbrio, dança. Todos com supervisão do fisioterapeuta."},{"titulo":"Sinais de alerta","texto":"Informe ao médico: quedas frequentes, mudança súbita no comportamento, dificuldade crescente para engolir ou piora repentina dos sintomas motores."}]},"avc":{"titulo":"AVC (Acidente Vascular Cerebral)","icone":"parcond2","cor":"#C0392B","resumo":"Após um AVC, a recuperação depende muito do trabalho feito em casa entre as sessões de fisioterapia. A repetição dos exercícios é fundamental para o reaprendizado motor.","paciente":[{"icon":"arm","titulo":"Exercite o lado afetado","texto":"Use sempre o lado afetado nas atividades do dia a dia. O cérebro reaprende pelo uso. Não substitua tudo com o lado saudável."},{"icon":"walk","titulo":"Treino de marcha","texto":"Caminhe todos os dias, mesmo que por poucos minutos. Foque em dar passos iguais e não arrastar o pé. Use o andador ou bengala conforme orientado."},{"icon":"chair","titulo":"Posicionamento na cadeira","texto":"Sente-se com o quadril bem ao fundo, pés apoiados no chão, braços apoiados na mesa. Evite ficar com o braço caído sem suporte."},{"icon":"bed","titulo":"Posicionamento no leito","texto":"Mude de posição a cada 2 horas se houver dificuldade de movimento. Posicione almofadas para apoiar o lado afetado e evitar encurtamentos."},{"icon":"talk","titulo":"Comunicação (afasia)","texto":"Se tiver dificuldade de falar: use gestos, escreva, aponte figuras. Não finja entender se não entendeu, peça que repita de outra forma."},{"icon":"food","titulo":"Disfagia (engasgo)","texto":"Sente-se ereto, incline levemente o queixo para baixo ao engolir, prefira alimentos pastosos. Consulte o fonoaudiólogo."}],"cuidador":[{"titulo":"Assistência nas AVDs","texto":"Ajude apenas o necessário, o objetivo é que a pessoa faça o máximo por si mesma. Dar toda a ajuda pode atrasar a recuperação."},{"titulo":"Heminegligência","texto":"Se a pessoa ignorar o lado afetado: posicione objetos importantes desse lado, aborde sempre pelo lado afetado para aumentar a consciência corporal."},{"titulo":"Espasticidade","texto":"Músculos rígidos no lado afetado são comuns. Realize o alongamento diário conforme orientado. Nunca force articulações resistentes."},{"titulo":"Prevenção de ombro doloroso","texto":"Nunca puxe pela mão ou ombro do lado afetado. Apoie sempre o braço ao mover o paciente. Use tipoia apenas se indicado."},{"titulo":"Controle emocional","texto":"Choro e riso inapropriados (labilidade emocional) são comuns e são neurológicos. Seja paciente, não reforce o choro mas não o ignore."},{"titulo":"Sinais de alerta de novo AVC","texto":"FAST: Face (boca torta), Arms (braço caindo), Speech (fala embaralhada), Time (ligue 192). Qualquer piora súbita requer emergência."}]},"alzheimer":{"titulo":"Doença de Alzheimer","icone":"parcond3","cor":"#7A5FA5","resumo":"O Alzheimer é uma doença que afeta a memória e o comportamento de forma progressiva. Ambiente seguro, rotina previsível e estimulação cognitiva fazem grande diferença.","paciente":[{"icon":"note","titulo":"Use lembretes visuais","texto":"Coloque post-its com lembretes em lugares estratégicos. Use um quadro com a rotina do dia visível."},{"icon":"walk","titulo":"Mantenha-se ativo","texto":"Caminhadas diárias ajudam o humor e o sono. Atividades manuais como jardinar e pintar mantêm o cérebro ativo."},{"icon":"music","titulo":"Música","texto":"Músicas antigas e familiares ativam memórias emocionais preservadas. Músicas da juventude podem trazer bem-estar mesmo em fases avançadas."},{"icon":"sleep","titulo":"Sono regular","texto":"Mantenha horários fixos para dormir e acordar. Evite sonecas longas durante o dia. Boa iluminação durante o dia e ambiente escuro à noite."},{"icon":"puzzle","titulo":"Estimulação cognitiva","texto":"Jogos de cartas, palavras-cruzadas simples, álbuns de fotos. Ajuste a dificuldade ao nível atual, sem frustrar."},{"icon":"shoe","titulo":"Segurança nos movimentos","texto":"Use calçados fechados com velcro ou elástico. Evite meias sem sapatos. Mantenha-se na rotina de movimentos que ainda domina."}],"cuidador":[{"titulo":"Comunicação eficaz","texto":"Fale devagar, com frases simples, olhando nos olhos. Diga o nome da pessoa antes de falar. Não corrija memórias falsas."},{"titulo":"Segurança do ambiente","texto":"Trancas de segurança no fogão, banheiro e portões externos. Retire objetos cortantes do alcance. Identifique a pessoa com pulseira de identificação."},{"titulo":"Agitação e agressividade","texto":"Identifique gatilhos (dor, fome, barulho). Aproxime-se com calma, voz suave. Redirecione para outra atividade."},{"titulo":"Deambulação","texto":"Instale alarmes nas portas. Coloque capachos pretos na saída (ilusão de buraco). Registre horários habituais de agitação."},{"titulo":"Higiene e alimentação","texto":"Estabeleça rotina fixa de banho. Simplifique as refeições. Ofereça alimentos que possam ser comidos com as mãos se usar talheres virar problema."},{"titulo":"Cuidado com o cuidador","texto":"Exaustão do cuidador é real e séria. Peça ajuda, estabeleça revezamento, participe de grupos de apoio. Você só pode cuidar bem se também estiver bem."}]},"medular":{"titulo":"Lesão Medular","icone":"parcond4","cor":"#4A7FA5","resumo":"Após uma lesão medular, os cuidados domiciliares são essenciais para prevenir complicações e maximizar a independência. Cada lesão é única, siga as orientações do seu fisioterapeuta.","paciente":[{"icon":"turn","titulo":"Alívio de pressão","texto":"Se usar cadeira de rodas: faça push-ups de pressão (levante o corpo por 15 segundos) a cada 30 minutos, ou incline-se para os lados alternadamente. Fundamental para evitar escaras."},{"icon":"bed","titulo":"Posicionamento na cama","texto":"Mude de posição a cada 2 horas durante a noite se não tiver sensibilidade. Use almofadas entre os joelhos e tornozelos para evitar pressão."},{"icon":"lung","titulo":"Exercícios respiratórios","texto":"Inspire fundo várias vezes ao dia. Em lesões cervicais e torácicas altas, pratique tosse assistida se necessário. Infecções pulmonares são um risco sério."},{"icon":"arm","titulo":"Exercícios dos membros superiores","texto":"Realize os exercícios prescritos diariamente. A força dos braços é fundamental para todas as transferências e propulsão da cadeira."},{"icon":"temp","titulo":"Controle da temperatura","texto":"Lesões acima de T6 podem afetar a regulação térmica. Em dias quentes: hidrate-se, evite sol direto. Em dias frios: agasalhe-se bem, especialmente os pés."},{"icon":"wc","titulo":"Rotina de bexiga e intestino","texto":"Siga rigorosamente o programa de bexiga e intestino prescrito. A consistência é fundamental para evitar infecções e complicações."}],"cuidador":[{"titulo":"Transferências seguras","texto":"Aprenda as técnicas de transferência com o fisioterapeuta antes de realizá-las sozinho. Use cinto de transferência. Nunca puxe pelos membros."},{"titulo":"Prevenção de escaras","texto":"Inspecione diariamente a pele em proeminências ósseas (sacro, calcanhares, cotovelos). Qualquer vermelhidão que não suma em 30 minutos é sinal de alerta."},{"titulo":"Disreflexia autonômica","texto":"Em lesões acima de T6: dor de cabeça intensa mais pressão alta mais pele avermelhada é emergência. Sente a pessoa, remova a causa e chame emergência se não melhorar."},{"titulo":"Espasmos musculares","texto":"Espasmos são comuns e geralmente não causam dano. Posicionamento correto e alongamento regular ajudam a controlá-los."},{"titulo":"Acessibilidade em casa","texto":"Verifique rampas, largura de portas (mínimo 80cm), banheiro adaptado, altura de superfícies. Pequenas adaptações aumentam muito a independência."},{"titulo":"Saúde mental","texto":"Ajustar-se à lesão é um processo longo. Tristeza e frustração são normais. Encoraje socialização e busque apoio psicológico quando necessário."}]},"geriatria":{"titulo":"Fisioterapia Geriátrica","icone":"parcond5","cor":"#5B8A6B","resumo":"Com o envelhecimento é normal que algumas capacidades diminuam, mas muito pode ser mantido e melhorado com exercício regular, alimentação adequada e prevenção de quedas.","paciente":[{"icon":"walk","titulo":"Caminhe todo dia","texto":"30 minutos de caminhada diária, mesmo que divididos em 3 períodos de 10 minutos, já trazem grandes benefícios. Use calçado adequado e caminhe em superfície segura."},{"icon":"arm","titulo":"Exercícios de força","texto":"Levantar e sentar da cadeira 10 vezes seguidas, subir escadas, exercícios com faixa elástica. Músculo forte significa menos quedas e mais independência."},{"icon":"balance","titulo":"Equilíbrio","texto":"Fique em pé com os pés juntos por 30 segundos, depois tente em um pé só (perto da parede). Pratique diariamente, o equilíbrio é treinável em qualquer idade."},{"icon":"pill","titulo":"Medicamentos","texto":"Anote todos os remédios e horários. Converse com o médico sobre qualquer tontura, queda ou confusão, podem ser efeitos colaterais."},{"icon":"food","titulo":"Alimentação","texto":"Proteína em todas as refeições (carne, ovo, feijão, leite). Hidrate-se mesmo sem sentir sede. Idosos têm sede diminuída. Evite ficar mais de 3 horas sem comer."},{"icon":"sleep","titulo":"Sono","texto":"Durma e acorde em horários regulares. Evite telas à noite. Se tiver insônia, converse com o médico, não tome soníferos por conta própria."}],"cuidador":[{"titulo":"Prevenção de quedas em casa","texto":"Iluminação: luzes de LED no corredor e banheiro à noite. Tapetes: retire ou fixe com fita dupla-face. Banheiro: barra de apoio, banco de banho, piso antiderrapante."},{"titulo":"Síndrome do imobilismo","texto":"Idoso que para de se mover deteriora rapidamente. Mesmo que esteja fraco ou com dor, estimule movimento diário conforme orientado."},{"titulo":"Declínio cognitivo leve","texto":"Esquecimentos frequentes merecem avaliação médica. Mantenha a pessoa engajada com atividades com propósito. Solidão acelera o declínio."},{"titulo":"Dor crônica","texto":"É comum mas não é normal, merece tratamento. Calor local, fisioterapia e medicação adequada são as opções principais."},{"titulo":"Osteoporose","texto":"Evite movimentos bruscos e de torção. Em caso de queda, não movimente a pessoa até descartar fratura. Sol diário (15-20 min) ajuda na vitamina D."},{"titulo":"Saber quando buscar ajuda","texto":"Confusão súbita, queda sem causa aparente, febre, recusa alimentar ou dor nova: todos merecem avaliação médica rápida."}]},"fibromialgia":{"titulo":"Fibromialgia","icone":"parcond6","cor":"#A05CA0","resumo":"A fibromialgia causa dor difusa no corpo, fadiga e sono não reparador. O tratamento é multidisciplinar e o autocuidado em casa é parte fundamental do controle dos sintomas.","paciente":[{"icon":"swim","titulo":"Exercício aeróbico leve","texto":"Caminhada na água, natação ou caminhada leve são os melhores exercícios. Comece devagar (10-15 min) e aumente gradualmente. O exercício melhora a dor crônica a longo prazo."},{"icon":"yoga","titulo":"Alongamento e relaxamento","texto":"Alongamento suave diário, yoga e técnicas de relaxamento muscular progressivo ajudam a controlar a tensão muscular e a dor."},{"icon":"sleep","titulo":"Higiene do sono","texto":"Horário fixo, quarto escuro e fresco, sem telas 1 hora antes de dormir. O sono não reparador é um dos maiores gatilhos da dor na fibromialgia."},{"icon":"heat","titulo":"Calor local","texto":"Bolsa de água quente nas áreas dolorosas por 15-20 minutos alivia a dor muscular. Banho quente pela manhã ajuda a começar o dia."},{"icon":"diary","titulo":"Diário de dor","texto":"Registre dor (0-10), sono, atividade e humor diariamente. Isso ajuda a identificar gatilhos e a conversar melhor com a equipe de saúde."},{"icon":"pace","titulo":"Ritmo (pacing)","texto":"Distribua as atividades ao longo do dia. Evite fazer tudo em um dia bom. Descanse antes de ficar exausto. Aprenda a dizer não."}],"cuidador":[{"titulo":"A dor é real","texto":"Fibromialgia não aparece em exames comuns mas é real. Evite dizer que a pessoa parece bem ou que é psicológico. Validar a dor é parte do cuidado."},{"titulo":"Dias bons e dias ruins","texto":"A fibromialgia flutua muito. Nos dias ruins: minimize demandas e ofereça calor e descanso. Nos dias bons: incentive atividade, mas não empurre além do limite."},{"titulo":"Estresse como gatilho","texto":"Estresse amplifica a dor na fibromialgia. Ajude a criar um ambiente mais calmo e previsível. Conflitos domésticos pioram os sintomas diretamente."},{"titulo":"Apoio sem superproteção","texto":"Faça o que a pessoa não consegue fazer, mas não faça o que ela consegue. Dependência excessiva piora a condição a longo prazo."},{"titulo":"Saúde mental","texto":"Depressão e ansiedade são muito comuns na fibromialgia. Apoio psicológico é parte do tratamento, não fraqueza."},{"titulo":"Medicação","texto":"Os remédios para fibromialgia podem demorar semanas para fazer efeito. Não interrompa sem orientação médica mesmo se não ver melhora imediata."}]},"escoliose":{"titulo":"Escoliose","icone":"parcond7","cor":"#5A7FA0","resumo":"A escoliose é uma curvatura lateral da coluna. Com os exercícios certos e cuidados posturais, é possível controlar a progressão e diminuir dores.","paciente":[{"icon":"posture","titulo":"Consciência postural","texto":"Observe-se no espelho de frente: ombros, quadris e orelhas devem estar na mesma altura. Pratique a postura correta sentado: costas apoiadas, pés no chão."},{"icon":"bag","titulo":"Mochila","texto":"Use mochila nas duas alças, com peso próximo às costas. Limite o peso a 10 por cento do peso corporal. Nunca use bolsa só no ombro por períodos longos."},{"icon":"bed","titulo":"Posição para dormir","texto":"Prefira deitar de lado, com travesseiro entre os joelhos para alinhar o quadril. Colchão de dureza média, nem muito mole nem muito duro."},{"icon":"swim","titulo":"Natação","texto":"A natação é excelente para a escoliose, especialmente o crawl e o nado de costas. Converse com seu fisioterapeuta sobre o estilo mais adequado."},{"icon":"laptop","titulo":"Postura no trabalho e estudo","texto":"Monitores na altura dos olhos. Cadeira com apoio lombar. Pause a cada 30 minutos para se levantar. Evite uso prolongado do celular com a cabeça inclinada."},{"icon":"exercise","titulo":"Faça os exercícios prescritos","texto":"Os exercícios específicos prescritos pelo seu fisioterapeuta são o tratamento mais importante fora das sessões. A consistência diária é o que faz diferença."}],"cuidador":[{"titulo":"Uso do colete","texto":"Se prescrito: use nos horários orientados (geralmente 18-23 horas por dia em adolescentes em crescimento). Inspecione a pele diariamente para pontos de pressão."},{"titulo":"Monitoramento","texto":"Em crianças e adolescentes em crescimento, a escoliose pode progredir rapidamente. Mantenha as consultas regulares e observe mudanças na postura."},{"titulo":"Impacto emocional","texto":"A escoliose, especialmente o colete, pode afetar a autoestima de adolescentes. Incentive a socialização e esportes adaptados."},{"titulo":"Atividade física","texto":"Escoliose não é motivo para ser sedentário. Esportes bilaterais (natação, ciclismo) são geralmente indicados. Avalie esportes assimétricos com o fisioterapeuta."},{"titulo":"Após cirurgia","texto":"Restrições de movimento são temporárias. Siga o protocolo de retorno às atividades. As primeiras 6-8 semanas são cruciais para a consolidação."},{"titulo":"Dor","texto":"Dor leve é comum e controlada com exercício e postura. Dor intensa, especialmente com irradiação para as pernas, merece avaliação médica urgente."}]},"traumato":{"titulo":"Fisioterapia Traumato-Ortopédica","icone":"parcond8","cor":"#2E7D32","resumo":"Lesões musculoesqueléticas, sejam fraturas, entorses, tendinites ou pós-cirúrgico, exigem cuidados específicos em casa para uma recuperação segura e eficaz.","paciente":[{"icon":"ice","titulo":"Gelo ou calor?","texto":"Gelo nas primeiras 48-72h após lesão aguda: 15 min, a cada 2-3 horas. Após esse período ou em dores crônicas: calor é mais confortável. Sempre com pano entre pele e bolsa."},{"icon":"swelling","titulo":"Edema (inchaço)","texto":"Mantenha o membro elevado acima do coração sempre que possível. Movimentos suaves dos dedos ou do tornozelo ajudam a drenar o inchaço durante o repouso."},{"icon":"pill","titulo":"Medicação anti-inflamatória","texto":"Tome apenas conforme prescrito. Anti-inflamatórios em excesso podem retardar a cicatrização em alguns tipos de lesão."},{"icon":"exercise","titulo":"Exercícios prescritos","texto":"Faça os exercícios no número de repetições indicadas, nem menos, nem mais. Dor leve durante o exercício é esperada. Dor intensa ou nova é sinal para parar."},{"icon":"alert","titulo":"Sinais de complicação","texto":"Inchaço que piora, pele avermelhada e quente, febre, dor intensa que não melhora: procure o médico imediatamente."},{"icon":"crutch","titulo":"Apoio correto","texto":"Se usar muleta, bengala ou andador: mantenha no lado correto e no comprimento certo. Carga no membro somente conforme liberação médica."}],"cuidador":[{"titulo":"Imobilização","texto":"Gesso, tala ou órtese: não molhe, verifique diariamente a circulação dos dedos (cor, temperatura, sensibilidade). Dedos frios, roxos ou dormentes são emergência."},{"titulo":"Pós-operatório de artroplastia","texto":"Primeiras 6 semanas: evite flexão acima de 90 graus, adução além da linha média e rotação interna. Altura adequada do vaso sanitário e da cadeira é fundamental."},{"titulo":"Lesão de ligamento","texto":"Entorses de tornozelo: Proteção, Repouso, Gelo, Compressão, Elevação nas primeiras 48 horas. Depois, início precoce do movimento conforme orientação."},{"titulo":"Síndrome do túnel do carpo","texto":"Talas noturnas, evitar movimentos repetitivos. Exercícios de deslizamento do nervo mediano conforme orientação do fisioterapeuta."},{"titulo":"Apoio psicológico","texto":"Lesões longas podem causar frustração e medo do movimento. Valide o sentimento e encoraje progresso gradual."},{"titulo":"Retorno às atividades","texto":"Não deixe a melhora da dor ser o único critério de retorno. A força e o equilíbrio precisam estar restaurados, siga as etapas do fisioterapeuta."}]},"neuroped":{"titulo":"Neuropediatria","icone":"parcond9","cor":"#E67E22","resumo":"Crianças com condições neurológicas têm grande plasticidade cerebral. O ambiente em casa e as interações diárias são parte fundamental do tratamento.","paciente":[{"icon":"play","titulo":"Brincadeira é terapia","texto":"Atividades lúdicas que trabalham equilíbrio, coordenação e força. Brinquedos adaptados, piscina de bolinhas, balanço, gangorra. A motivação da criança é o melhor recurso."},{"icon":"sensory","titulo":"Estimulação sensorial","texto":"Ofereça diferentes texturas, temperaturas e superfícies com segurança. Caminhada na areia, grama, tapetes texturizados. Estimulação sensorial ajuda no desenvolvimento."},{"icon":"repeat","titulo":"Reforce o que foi trabalhado na sessão","texto":"Pratique os movimentos e atividades trabalhados na fisioterapia durante o dia. 10 minutos várias vezes ao dia é mais eficaz que uma sessão longa."},{"icon":"sleep","titulo":"Sono adequado","texto":"Crianças com condições neurológicas frequentemente têm distúrbios do sono. Rotina rígida, ambiente adequado e comunicação com o médico são essenciais."},{"icon":"food","titulo":"Alimentação","texto":"Dificuldades de mastigação e deglutição são comuns. Textura adaptada, tempo suficiente para as refeições, posicionamento correto (tronco ereto, pés apoiados)."},{"icon":"talk","titulo":"Comunicação","texto":"Incentive qualquer forma de comunicação: fala, gestos, olhar, prancha de comunicação alternativa. Responda sempre, a criança está se comunicando mesmo sem palavras."}],"cuidador":[{"titulo":"Posicionamento correto","texto":"A posição correta ao longo do dia previne deformidades e facilita a função. Aprenda com o fisioterapeuta o posicionamento adequado para cada atividade."},{"titulo":"Espasticidade na PC","texto":"Banho morno antes dos exercícios ajuda a relaxar os músculos. Alongamento suave e lento. Nunca force articulações rígidas. Comunique mudanças no tônus ao fisioterapeuta."},{"titulo":"Adaptações ambientais","texto":"Rampa, banheiro adaptado, cadeira de rodas do tamanho correto, suportes e órteses adequados. Avaliação do fisioterapeuta no ambiente domiciliar pode revelar adaptações importantes."},{"titulo":"Manejo do comportamento","texto":"Muitas condições neurológicas cursam com alterações comportamentais. Rotina previsível e comunicação clara ajudam. Equipe multiprofissional é fundamental."},{"titulo":"Inclusão e socialização","texto":"Crianças com necessidades especiais se beneficiam do contato com outras crianças. Estimule a inclusão em atividades da comunidade, escola e grupos de famílias."},{"titulo":"Cuidado com o cuidador","texto":"Cuidar de uma criança com necessidades especiais é intenso. Busque redes de apoio, grupos de pais, descanso programado. Cuide de você para poder cuidar bem."}]},"escalas":{"titulo":"Orientações Gerais de Reabilitação","icone":"parcond10","cor":"#1A5276","resumo":"Orientações gerais aplicáveis a qualquer processo de reabilitação. Estas são as bases de um bom tratamento, independente da condição clínica.","paciente":[{"icon":"calendar","titulo":"Regularidade é tudo","texto":"Faça os exercícios prescritos todos os dias, mesmo que por menos tempo. A regularidade supera a intensidade."},{"icon":"water","titulo":"Hidratação","texto":"Beba pelo menos 2 litros de água por dia. Músculos e articulações precisam de hidratação para funcionar bem."},{"icon":"note","titulo":"Anote as dúvidas","texto":"Antes das sessões de fisioterapia, anote o que percebeu: dores novas, melhoras, dificuldades com os exercícios."},{"icon":"alert","titulo":"Dor: quando parar","texto":"Dor leve (até 4 em 10) durante exercício é esperada. Dor aguda, nova ou intensa: pare e informe ao fisioterapeuta."},{"icon":"trophy","titulo":"Registre seu progresso","texto":"Fotografe, meça, anote. Ver a evolução ao longo das semanas é um motivador poderoso. Comemore cada pequena vitória."},{"icon":"sleep","titulo":"Recuperação","texto":"Descanso faz parte do treino. Músculo se recupera no repouso. Durma bem, o sono é o melhor recuperador natural."}],"cuidador":[{"titulo":"Seja encorajador, não crítico","texto":"Foque no progresso, não na perfeição. Dizer que a pessoa está melhorando é mais útil que apontar o que ela ainda não consegue fazer. A motivação é um recurso terapêutico real."},{"titulo":"Acompanhe as sessões quando possível","texto":"Assistir às sessões de fisioterapia ajuda a entender os exercícios e a reforçá-los em casa corretamente."},{"titulo":"Ambiente seguro","texto":"Adapte a casa para a fase atual da reabilitação. O que é seguro depois pode não ser agora. Avalie periodicamente as necessidades de adaptação."},{"titulo":"Medicação em dia","texto":"Controle os remédios, horários e validades. Medicamentos precisam ser tomados conforme prescrição para o tratamento funcionar."},{"titulo":"Rede de apoio","texto":"A reabilitação é mais eficaz com equipe: fisioterapeuta, médico, nutricionista, psicólogo. Não hesite em buscar encaminhamentos quando necessário."},{"titulo":"Respeite o ritmo","texto":"Cada pessoa tem seu ritmo de recuperação. O progresso individual é o único parâmetro que importa."}]}}');

function openCartilha(pid){
  var p=db.patients.find(function(pt){return pt.id===pid;});
  if(!p)return;
  var conds=(p.conds||[]).filter(function(c){return CARTILHA_DATA[c];});
  if(!conds.length){toast('Nenhuma condicao com cartilha disponivel','warn');return;}
  if(conds.length===1){_renderCartilha(p,conds[0]);return;}
  var html='<div style="padding:16px;max-width:420px;margin:0 auto">';
  html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">';
  html+='<button onclick="renderPatientProfile(db.patients.find(function(pt){return pt.id==='+pid+'}))" style="background:none;border:none;font-size:20px;cursor:pointer">&#8592;</button>';
  html+='<h3 style="margin:0;font-size:16px">Cartilha Domiciliar</h3></div>';
  html+='<p style="font-size:12px;color:#666;margin-bottom:12px">Selecione a condicao:</p>';
  conds.forEach(function(c){
    var m=COND_META[c]||{};
    var cd=CARTILHA_DATA[c];
    html+='<div onclick="_renderCartilha(db.patients.find(function(pt){return pt.id==='+pid+'}),\''+c+'\')" style="display:flex;align-items:center;gap:12px;padding:14px;border:1.5px solid '+m.ac+'44;border-radius:10px;margin-bottom:8px;cursor:pointer;background:'+m.acp+'">';
    html+='<span style="font-size:24px">'+cd.icone+'</span>';
    html+='<div><div style="font-weight:700;color:'+m.ac+'">'+cd.titulo+'</div><div style="font-size:11px;color:#666">Orientacoes para paciente e cuidador</div></div>';
    html+='</div>';
  });
  html+='</div>';
  document.getElementById('mainArea').innerHTML=html;
}

  var cd=CARTILHA_DATA[cond];

function showAllEvals(pid){
  var p=db.patients.find(function(pt){return pt.id===pid;});
  if(!p)return;
  curPid=pid;curView='evals_view';
  var html='<div style="max-width:900px;margin:0 auto;padding:20px">'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">'

    +'</div>';
  var hasEvals=false;
  (p.conds||[]).forEach(function(cond){
    var m=COND_META[cond]||{};
    var evs=(p.condEvals&&p.condEvals[cond])||[];
    if(!evs.length)return;
    hasEvals=true;
    html+='<div style="background:var(--w);border-radius:var(--r);border:1px solid var(--g1);margin-bottom:12px;overflow:hidden;box-shadow:var(--sh0)">'
      +'<div style="padding:12px 16px;background:'+m.acp+';border-bottom:1px solid var(--g1);display:flex;align-items:center;gap:8px">'
      +'<div style="width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,'+m.ac+','+m.ac2+');display:flex;align-items:center;justify-content:center;font-size:13px">'+m.icon+'</div>'
      +'<span style="font-size:13px;font-weight:700;color:'+m.ac+'">'+m.label+'</span>'
      +'<span style="font-size:10px;color:var(--g4);margin-left:8px">'+evs.length+' avaliação(ões)</span>'
      +'</div>';
    var metrics=getMetrics(cond);
    if(metrics.length){
      html+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">'
        +'<tr><th style="background:'+m.ac+';color:#fff;padding:6px 10px;text-align:left;font-size:9px;font-weight:600">Escala</th>';
      evs.forEach(function(ev){
        var d=ev.date?new Date(ev.date+'T12:00:00').toLocaleDateString('pt-BR'):'—';
        html+='<th style="background:'+m.ac+';color:#fff;padding:6px 10px;text-align:center;font-size:9px;font-weight:600">'+ev.type.replace('Reavaliação','Reav.')+'<br>'+d+'</th>';
      });
      html+='<th style="background:'+m.ac+';color:#fff;padding:6px 10px;text-align:center;font-size:9px;font-weight:600">Tendência</th></tr>';
      metrics.forEach(function(mt){
        var vals=evs.map(function(ev){return ev.data[mt.key]||'';});
        if(!vals.some(function(v){return v!=='';}))return;
        var nums=vals.map(function(v){return parseFloat(v);}).filter(function(v){return !isNaN(v);});
        var trend='—',tStyle='color:var(--g4)';
        if(nums.length>=2){
          var diff=nums[nums.length-1]-nums[0];
          var imp=(diff>0&&!mt.inv)||(diff<0&&mt.inv);
          var wrs=(diff<0&&!mt.inv)||(diff>0&&mt.inv);
          if(imp){trend='↑ Melhora';tStyle='color:var(--gr2);font-weight:700';}
          else if(wrs){trend='↓ Piora';tStyle='color:#c62828;font-weight:700';}
          else{trend='→ Estável';}
        }
        html+='<tr><td style="padding:5px 10px;border-bottom:1px solid var(--g1);font-weight:500;color:var(--g6)">'+mt.label+'</td>';
        vals.forEach(function(v,i){
          var s='';
          if(v!==''&&nums.length>=2&&i>0){var n=parseFloat(v),ref=parseFloat(vals[0]);if(!isNaN(n)&&!isNaN(ref)&&n!==ref)s=(((n>ref&&!mt.inv)||(n<ref&&mt.inv))?'color:var(--gr2);font-weight:700':'color:#c62828;font-weight:700');}
          html+='<td style="padding:5px 10px;border-bottom:1px solid var(--g1);text-align:center;'+(s?s:'')+'">'+( v||'—')+'</td>';
        });
        html+='<td style="padding:5px 10px;border-bottom:1px solid var(--g1);text-align:center;'+tStyle+'">'+trend+'</td></tr>';
      });
      html+='</table></div>';
    }
    html+='<div style="padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--g1)">';
    evs.forEach(function(ev){
      var d=ev.date?new Date(ev.date+'T12:00:00').toLocaleDateString('pt-BR'):'—';
      html+='<button class="btn" style="background:'+m.acp+';color:'+m.ac+';font-size:10px;padding:5px 10px" onclick="openForm('+pid+',\''+cond+'\','+ev.id+')">✏️ '+ev.type+' ('+d+')</button>';
    });
    html+='</div></div>';
  });
  if(!hasEvals){
    html+='<div style="text-align:center;padding:40px;color:var(--g4)"><div style="font-size:40px">📊</div><p style="margin-top:8px;font-size:13px">Nenhuma avaliação registrada ainda.</p></div>';
  }
  html+='</div>';
  document.getElementById('mainArea').innerHTML=html;
}

       _sha256(email+'|'+pwd).then(function(h){

function resizeImageFile(file,maxW,callback){
  // Detect HEIC/HEIF files (camera photos on iPhone saved as HEIC)
  var isHeic=false;
  if(file.type&&(file.type.toLowerCase().indexOf('heic')>=0||file.type.toLowerCase().indexOf('heif')>=0)){isHeic=true;}
  if(!isHeic&&file.name){var n=file.name.toLowerCase();if(n.endsWith('.heic')||n.endsWith('.heif')){isHeic=true;}}

  // For HEIC go straight to fallback (FileReader) — createObjectURL+canvas fails silently on many devices
  if(isHeic){_resizeFallback(file,maxW,callback);return;}

  // Try via createObjectURL first (fast path for JPEG/PNG)
  var objectUrl=null;
  try{objectUrl=URL.createObjectURL(file);}catch(e){}
  if(objectUrl){
    var img=new Image();
    var timer=setTimeout(function(){
      // Timeout guard: if image never loads within 5s, fall back
      URL.revokeObjectURL(objectUrl);
      _resizeFallback(file,maxW,callback);
    },5000);
    img.onload=function(){
      clearTimeout(timer);
      var w=img.width,h=img.height;
      if(w<1||h<1){
        URL.revokeObjectURL(objectUrl);
        _resizeFallback(file,maxW,callback);
        return;
      }
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      try{
        var canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        var out=canvas.toDataURL('image/jpeg',0.85);
        URL.revokeObjectURL(objectUrl);
        if(out&&out.length>500&&out.indexOf('data:image/')===0){callback(out);}
        else{_resizeFallback(file,maxW,callback);}
      }catch(e){
        URL.revokeObjectURL(objectUrl);
        _resizeFallback(file,maxW,callback);
      }
    };
    img.onerror=function(){
      clearTimeout(timer);
      URL.revokeObjectURL(objectUrl);
      _resizeFallback(file,maxW,callback);
    };
    img.src=objectUrl;
    return;
  }
  _resizeFallback(file,maxW,callback);
}
function _resizeFallback(file,maxW,callback){
  var reader=new FileReader();
  reader.onload=function(ev){
    var dataUrl=ev.target.result;
    // Check for valid data URL (some browsers return empty or malformed for HEIC)
    var isValid=dataUrl&&dataUrl.length>500&&dataUrl.indexOf('data:image/')===0;
    if(!isValid){
      // HEIC/unknown: force read as ArrayBuffer and wrap as image/jpeg base64
      var r2=new FileReader();
      r2.onload=function(e2){
        try{
          var arr=new Uint8Array(e2.target.result);
          var mime='image/jpeg';
          var b64='';
          var chunk=8192;
          for(var i=0;i<arr.length;i+=chunk){
            b64+=String.fromCharCode.apply(null,arr.subarray(i,i+chunk));
          }
          var du='data:'+mime+';base64,'+btoa(b64);
          resizeViaCanvas(du,maxW,function(result){
            // If canvas also failed (HEIC not decoded), store raw bytes as-is
            if(result&&result.length>500){callback(result);}
            else{callback(du);}
          });
        }catch(e){callback('');}
      };
      r2.onerror=function(){callback('');};
      r2.readAsArrayBuffer(file);
      return;
    }
    resizeViaCanvas(dataUrl,maxW,callback);
  };
  reader.onerror=function(){callback('');};
  reader.readAsDataURL(file);
}
function resizeViaCanvas(dataUrl,maxW,callback){
  var img=new Image();
  img.onload=function(){
    var w=img.width,h=img.height;
    if(w<1||h<1){callback(dataUrl);return;}
    if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
    try{
      var canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      var out=canvas.toDataURL('image/jpeg',0.85);
      if(out&&out.length>500&&out.indexOf('data:image/')===0){callback(out);}
      else{callback(dataUrl);}
    }catch(e){callback(dataUrl);}
  };
  img.onerror=function(){callback(dataUrl);};
  img.src=dataUrl;
}

function addPhotoSlot(evalId){

  var old=document.getElementById('__photo_inp__');
  if(old)old.parentNode.removeChild(old);

  var inp=document.createElement('input');
  inp.id='__photo_inp__';
  inp.type='file';
  inp.accept='image/*,image/heic,image/heif';
  inp.multiple=true;
  // Must be in DOM for Android Chrome to fire onchange
  inp.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none';
  document.body.appendChild(inp);

  inp.onchange=function(){
    var files=Array.from(inp.files);
    // Clean up
    if(inp.parentNode)inp.parentNode.removeChild(inp);
    if(!files.length)return;
    // Show loading indicator
    var wrap=document.getElementById('photo_wrap_'+evalId);
    if(wrap){
      var loader=document.createElement('div');
      loader.id='photo_loader_'+evalId;
      loader.style.cssText='padding:12px;text-align:center;font-size:11px;color:var(--or);font-weight:600';
      loader.textContent='⏳ Processando '+files.length+' foto(s)...';
      wrap.insertBefore(loader,wrap.firstChild);
    }
    var done=0;
    var failed=0;
    files.forEach(function(file){
      resizeImageFile(file,1200,function(dataUrl){
        done++;
        if(dataUrl&&dataUrl.length>500){
          if(!photoStore[evalId])photoStore[evalId]=[];
          photoStore[evalId].push({src:dataUrl,desc:'',view:'Anterior'});
        }else{
          failed++;
        }
        if(done===files.length){
          var loader2=document.getElementById('photo_loader_'+evalId);
          if(loader2)loader2.remove();
          if(failed>0){
            var wrap2=document.getElementById('photo_wrap_'+evalId);
            if(wrap2){
              var errDiv=document.createElement('div');
              errDiv.style.cssText='padding:10px 12px;margin-bottom:8px;background:#fff3cd;border:1px solid #ffc107;border-radius:8px;font-size:11px;color:#856404;line-height:1.5';
              var total=files.length;
              var ok=total-failed;
              errDiv.innerHTML='⚠️ <b>'+failed+' foto'+(failed>1?'s':'')+' não carregou'+(failed>1?'ram':'')+'.</b><br>'
                +(ok>0?ok+' foto'+(ok>1?'s foram':' foi')+' salva'+(ok>1?'s':'')+' com sucesso. ':'')
                +'Fotos HEIC/HEIF do iPhone às vezes não são suportadas diretamente pelo browser. <b>Tente configurar a câmera para salvar em JPEG</b> (Ajustes › Câmera › Formatos › Mais Compatível), ou converta a foto no aplicativo Fotos antes de adicionar.';
              wrap2.insertBefore(errDiv,wrap2.firstChild);
              setTimeout(function(){if(errDiv.parentNode)errDiv.remove();},15000);

          savePhotos(evalId);
        }
      });
    });

  inp.click();

function viewPhoto(evalId,idx){

  window._pv={plumbFrac:0.5,gridOx:0,gridOy:0,plumbW:5};

  ov.innerHTML='<button class="photo-fs-close" onclick="this.parentNode.remove()">✕</button>'
    +'<div style="position:relative;display:inline-block;max-width:92vw;max-height:78vh" id="pv_imgbox" onclick="event.stopPropagation()">'
      +'<img id="pv_img" src="'+ph.src+'" style="max-width:92vw;max-height:78vh;display:block">'
      +'<div id="pv_grid" style="position:absolute;inset:0;pointer-events:none;display:none;background-image:linear-gradient(to right,rgba(232,132,74,.5) 1px,transparent 1px),linear-gradient(to bottom,rgba(232,132,74,.5) 1px,transparent 1px);background-size:10% 10%;background-position:0px 0px;touch-action:none;z-index:4"></div>'
      +'<div id="pv_vline" style="position:absolute;top:0;bottom:0;left:50%;width:32px;margin-left:-16px;pointer-events:none;display:none;cursor:ew-resize;touch-action:none;z-index:6">'
        +'<div id="pv_vline_l" style="position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);width:5px;background:rgba(198,40,40,.92)"></div>'
        +'<div style="position:absolute;top:8px;left:50%;transform:translateX(-50%);width:20px;height:20px;border-radius:50%;background:#C62828;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.5)"></div>'
        +'<div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:20px;height:20px;border-radius:50%;background:#C62828;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.5)"></div>'
      +'</div>'
    +'</div>'
    +'<div class="photo-fs-info" onclick="event.stopPropagation()">'+(ph.desc||ph.view||'')
      +'<div style="margin-top:8px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">'
      +'<button onclick="event.stopPropagation();pvToggleGrid()" style="padding:6px 12px;border:none;border-radius:7px;background:#E8844A;color:#fff;font-size:11px;font-weight:700;cursor:pointer">▦ Grade</button>'
      +'<button onclick="event.stopPropagation();pvTogglePlumb()" style="padding:6px 12px;border:none;border-radius:7px;background:#C62828;color:#fff;font-size:11px;font-weight:700;cursor:pointer">| Fio de prumo</button>'
      +'<button onclick="event.stopPropagation();pvPlumbThicker()" style="padding:6px 12px;border:none;border-radius:7px;background:#8B2E2E;color:#fff;font-size:11px;font-weight:700;cursor:pointer">⬍ Espessura</button>'
      +'<button onclick="event.stopPropagation();pvStartCrop(\''+evalId+'\','+idx+')" style="padding:6px 12px;border:none;border-radius:7px;background:#6B8F5E;color:#fff;font-size:11px;font-weight:700;cursor:pointer">✂ Enquadrar</button>'
      +'<button onclick="event.stopPropagation();pvSaveAnnotations(\''+evalId+'\','+idx+')" style="padding:6px 12px;border:none;border-radius:7px;background:#3a2f22;color:#fff;font-size:11px;font-weight:700;cursor:pointer">💾 Salvar marcações</button>'
      +(ph.orig?'<button onclick="event.stopPropagation();pvRestoreOriginal(\''+evalId+'\','+idx+')" style="padding:6px 12px;border:none;border-radius:7px;background:#777;color:#fff;font-size:11px;font-weight:700;cursor:pointer">↺ Original</button>':'')
      +'</div></div>';
  ov.onclick=function(){ov.remove();};
  document.body.appendChild(ov);
  pvSetupOverlay();
}
function pvToggleGrid(){var g=document.getElementById('pv_grid');if(!g)return;var on=g.style.display==='none';g.style.display=on?'block':'none';g.style.pointerEvents=on?'auto':'none';g.style.cursor='move';}
function pvTogglePlumb(){var v=document.getElementById('pv_vline');if(!v)return;var on=v.style.display==='none';v.style.display=on?'block':'none';v.style.pointerEvents=on?'auto':'none';}
function pvPlumbThicker(){
  if(!window._pv)window._pv={plumbFrac:0.5,gridOx:0,gridOy:0,plumbW:5};
  var arr=[3,5,7,10,14];var i=arr.indexOf(window._pv.plumbW);i=(i+1)%arr.length;window._pv.plumbW=arr[i];
  var l=document.getElementById('pv_vline_l');if(l)l.style.width=arr[i]+'px';
  var v=document.getElementById('pv_vline');if(v&&v.style.display==='none'){v.style.display='block';v.style.pointerEvents='auto';}
  if(typeof toast==='function')toast('Espessura do fio: '+arr[i]+'px','ok');
}
function pvSetupOverlay(){
  var box=document.getElementById('pv_imgbox');var img=document.getElementById('pv_img');
  var grid=document.getElementById('pv_grid');var vline=document.getElementById('pv_vline');
  if(!box||!img)return;
  if(!window._pv)window._pv={plumbFrac:0.5,gridOx:0,gridOy:0,plumbW:5};
  function pt(e){var t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}
  function drag(el,onStart,onMove){
    if(!el)return;
    var active=false;
    function down(e){e.preventDefault();e.stopPropagation();active=true;onStart(pt(e));
      document.addEventListener('mousemove',mv);document.addEventListener('touchmove',mv,{passive:false});
      document.addEventListener('mouseup',up);document.addEventListener('touchend',up);}
    function mv(e){if(!active)return;e.preventDefault();onMove(pt(e));}
    function up(){active=false;document.removeEventListener('mousemove',mv);document.removeEventListener('touchmove',mv);document.removeEventListener('mouseup',up);document.removeEventListener('touchend',up);}
    el.addEventListener('mousedown',down);el.addEventListener('touchstart',down,{passive:false});
  }
  // Fio de prumo: arrasta na horizontal
  var sf=0,sx=0;
  drag(vline,function(p){sx=p.x;sf=window._pv.plumbFrac;},function(p){
    var bw=img.clientWidth||1;var f=Math.max(0,Math.min(1,sf+(p.x-sx)/bw));
    window._pv.plumbFrac=f;vline.style.left=(f*100)+'%';
  });
  // Grade: arrasta nos dois eixos
  var sox=0,soy=0,gsx=0,gsy=0;
  drag(grid,function(p){gsx=p.x;gsy=p.y;sox=window._pv.gridOx;soy=window._pv.gridOy;},function(p){
    window._pv.gridOx=sox+(p.x-gsx);window._pv.gridOy=soy+(p.y-gsy);
    grid.style.backgroundPosition=window._pv.gridOx+'px '+window._pv.gridOy+'px';
  });
}
function pvSaveAnnotations(evalId,idx){
  var img=document.getElementById('pv_img');if(!img)return;
  var grid=document.getElementById('pv_grid');var vline=document.getElementById('pv_vline');
  var showGrid=grid&&grid.style.display!=='none';
  var showPlumb=vline&&vline.style.display!=='none';
  if(!showGrid&&!showPlumb){toast('Ative a grade ou o fio de prumo antes de salvar','warn');return;}
  var im=new Image();
  im.onload=function(){
    var w=im.naturalWidth,h=im.naturalHeight;
    var cv=document.createElement('canvas');cv.width=w;cv.height=h;
    var ctx=cv.getContext('2d');
    ctx.drawImage(im,0,0,w,h);
    var st=window._pv||{plumbFrac:0.5,gridOx:0,gridOy:0,plumbW:5};
    var dispW=img.clientWidth||w, dispH=img.clientHeight||h;
    var scaleX=w/dispW, scaleY=h/dispH;
    if(showGrid){
      ctx.strokeStyle='rgba(232,132,74,0.6)';ctx.lineWidth=Math.max(1,Math.round(w/750));
      var cellW=w/10, cellH=h/10;
      var ox=(((st.gridOx*scaleX)%cellW)+cellW)%cellW;
      var oy=(((st.gridOy*scaleY)%cellH)+cellH)%cellH;
      for(var gx=ox;gx<w-0.5;gx+=cellW){var X=Math.round(gx)+0.5;ctx.beginPath();ctx.moveTo(X,0);ctx.lineTo(X,h);ctx.stroke();}
      for(var gy=oy;gy<h-0.5;gy+=cellH){var Y=Math.round(gy)+0.5;ctx.beginPath();ctx.moveTo(0,Y);ctx.lineTo(w,Y);ctx.stroke();}
    }
    if(showPlumb){
      ctx.strokeStyle='rgba(198,40,40,0.88)';ctx.lineWidth=Math.max(2,Math.round((st.plumbW||5)*scaleX));
      var px=Math.round((st.plumbFrac!=null?st.plumbFrac:0.5)*w)+0.5;ctx.beginPath();ctx.moveTo(px,0);ctx.lineTo(px,h);ctx.stroke();
    }
    var out=cv.toDataURL('image/jpeg',0.92);
    var photos=photoStore[evalId]||[];
    if(photos[idx]){
      if(!photos[idx].orig)photos[idx].orig=photos[idx].src;
      photos[idx].src=out;savePhotos(evalId);
      if(typeof renderPhotos==='function')renderPhotos(evalId,curCond);
    }
    var ov=document.querySelector('.photo-fullscreen');if(ov)ov.remove();
    toast('Foto salva com as marcações!','ok');
  };
  im.src=img.src;
}
function pvRestoreOriginal(evalId,idx){
  var photos=photoStore[evalId]||[];
  if(photos[idx]&&photos[idx].orig){
    photos[idx].src=photos[idx].orig;delete photos[idx].orig;savePhotos(evalId);
    if(typeof renderPhotos==='function')renderPhotos(evalId,curCond);
    var ov=document.querySelector('.photo-fullscreen');if(ov)ov.remove();
    toast('Foto original restaurada','ok');
  }else{toast('Esta foto não tem versão original salva','warn');}
}
function pvStartCrop(evalId,idx){
  var box=document.getElementById('pv_imgbox');var img=document.getElementById('pv_img');
  if(!box||!img)return;
  // remove grids durante o recorte
  var g=document.getElementById('pv_grid');if(g)g.style.display='none';
  var v=document.getElementById('pv_vline');if(v)v.style.display='none';
  var sel=document.createElement('div');
  sel.id='pv_crop';
  sel.style.cssText='position:absolute;border:2px dashed #fff;box-shadow:0 0 0 9999px rgba(0,0,0,.45);left:15%;top:15%;width:70%;height:70%;cursor:move;touch-action:none';
  box.appendChild(sel);
  // alça de redimensionamento
  var handle=document.createElement('div');
  handle.style.cssText='position:absolute;right:-9px;bottom:-9px;width:20px;height:20px;background:#E8844A;border:2px solid #fff;border-radius:50%;cursor:nwse-resize;touch-action:none';
  sel.appendChild(handle);
  var bar=document.createElement('div');
  bar.style.cssText='position:absolute;left:0;right:0;bottom:-46px;display:flex;gap:8px;justify-content:center';
  bar.innerHTML='<button id="pv_cropok" style="padding:7px 14px;border:none;border-radius:7px;background:#6B8F5E;color:#fff;font-size:12px;font-weight:700;cursor:pointer">✓ Aplicar recorte</button>'
    +'<button id="pv_cropcancel" style="padding:7px 14px;border:none;border-radius:7px;background:#777;color:#fff;font-size:12px;font-weight:700;cursor:pointer">Cancelar</button>';
  sel.appendChild(bar);
  function pt(e){var t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}
  var mode=null,start=null,orig=null;
  function onDown(e,m){e.preventDefault();e.stopPropagation();mode=m;start=pt(e);orig={l:sel.offsetLeft,t:sel.offsetTop,w:sel.offsetWidth,h:sel.offsetHeight};
    document.addEventListener('mousemove',onMove);document.addEventListener('touchmove',onMove,{passive:false});
    document.addEventListener('mouseup',onUp);document.addEventListener('touchend',onUp);}
  function onMove(e){if(!mode)return;e.preventDefault();var p=pt(e);var dx=p.x-start.x,dy=p.y-start.y;var bw=box.clientWidth,bh=box.clientHeight;
    if(mode==='move'){var nl=Math.max(0,Math.min(orig.l+dx,bw-orig.w)),nt=Math.max(0,Math.min(orig.t+dy,bh-orig.h));sel.style.left=nl+'px';sel.style.top=nt+'px';sel.style.width=orig.w+'px';sel.style.height=orig.h+'px';}
    else{var nw=Math.max(40,Math.min(orig.w+dx,bw-orig.l)),nh=Math.max(40,Math.min(orig.h+dy,bh-orig.t));sel.style.width=nw+'px';sel.style.height=nh+'px';}}
  function onUp(){mode=null;document.removeEventListener('mousemove',onMove);document.removeEventListener('touchmove',onMove);document.removeEventListener('mouseup',onUp);document.removeEventListener('touchend',onUp);}
  sel.addEventListener('mousedown',function(e){if(e.target===handle||bar.contains(e.target))return;onDown(e,'move');});
  sel.addEventListener('touchstart',function(e){if(e.target===handle||bar.contains(e.target))return;onDown(e,'move');},{passive:false});
  handle.addEventListener('mousedown',function(e){onDown(e,'resize');});
  handle.addEventListener('touchstart',function(e){onDown(e,'resize');},{passive:false});
  // Liga ação tanto ao toque (touchend) quanto ao clique — no celular o clique
  // dentro da área de recorte era engolido pelo gesto de arrastar.
  function _bindTap(el,fn){
    if(!el)return;
    var handled=false;
    el.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();handled=true;fn();},{passive:false});
    el.addEventListener('click',function(e){e.stopPropagation();if(handled){handled=false;return;}fn();});
  }
  _bindTap(document.getElementById('pv_cropcancel'),function(){if(sel.parentNode)sel.remove();});
  _bindTap(document.getElementById('pv_cropok'),function(){
    var iw=img.clientWidth||img.naturalWidth, ih=img.clientHeight||img.naturalHeight;
    var sl=sel.offsetLeft/iw, st=sel.offsetTop/ih;
    var sw=sel.offsetWidth/iw, sh=sel.offsetHeight/ih;
    var im=new Image();
    im.onload=function(){
      try{
        var cx=Math.max(0,sl*im.naturalWidth), cy=Math.max(0,st*im.naturalHeight);
        var cw=Math.min(sw*im.naturalWidth, im.naturalWidth-cx), ch=Math.min(sh*im.naturalHeight, im.naturalHeight-cy);
        if(cw<2||ch<2){toast('Área de recorte muito pequena','warn');return;}
        var cv=document.createElement('canvas');cv.width=Math.round(cw);cv.height=Math.round(ch);
        cv.getContext('2d').drawImage(im,cx,cy,cw,ch,0,0,Math.round(cw),Math.round(ch));
        var out=cv.toDataURL('image/jpeg',0.9);
        var photos=photoStore[evalId]||[];
        if(photos[idx]){if(!photos[idx].orig)photos[idx].orig=photos[idx].src;photos[idx].src=out;savePhotos(evalId);if(typeof renderPhotos==='function')renderPhotos(evalId,curCond);}
        var ov=document.querySelector('.photo-fullscreen');if(ov)ov.remove();
        toast('Imagem enquadrada e salva!','ok');
      }catch(err){console.warn('crop error',err);toast('Não foi possível recortar esta imagem','err');}
    };
    im.onerror=function(){toast('Erro ao carregar a imagem para recorte','err');};
    im.src=img.src;
  });
}
function savePhotos(evalId){
  var photos=photoStore[evalId]||[];
  var key='bv_photos_'+evalId;
  var json=JSON.stringify(photos);
  // Salva local
  if(idb){
    try{
      var tx=idb.transaction(['app'],'readwrite');
      tx.objectStore('app').put(json,key);
    }catch(e){console.warn('IDB savePhotos error',e);}
  }
  // localStorage não guarda fotos quando há IndexedDB (evita estourar a cota).
  if(idb){ try{ localStorage.removeItem(key); }catch(e){} }
  else { try{ localStorage.setItem(key,json); }catch(e){} }
  // Sincroniza com Firebase via db.photos
  if(!db.photos)db.photos={};
  db.photos[key]=photos;
  if(window._photoSaveTimer)clearTimeout(window._photoSaveTimer);
  window._photoSaveTimer=setTimeout(function(){saveDB();},1500);
}
function loadPhotos(evalId,callback){
  var key='bv_photos_'+evalId;
  var done=function(photos){
    photoStore[evalId]=photos&&photos.length?photos:[];
    if(callback)callback();
  };
  if(idb){
    try{
      var tx=idb.transaction(['app'],'readonly');
      var req=tx.objectStore('app').get(key);
      req.onsuccess=function(){
        if(req.result){
          try{var p=JSON.parse(req.result);if(p&&p.length){done(p);return;}}catch(e){}
        }
        _loadPhotosLS(evalId,done);
      };
      req.onerror=function(){_loadPhotosLS(evalId,done);};
      return;
    }catch(e){}
  }
  _loadPhotosLS(evalId,done);
}
function _loadPhotosLS(evalId,done){
  try{
    var raw=localStorage.getItem('bv_photos_'+evalId);
    if(raw){var p=JSON.parse(raw);if(p&&p.length){done(p);return;}}
  }catch(e){}
  done([]);
}
</script>

function _docContrato(p){var C=DOCS_CLINICA;
  return '<div class="doc">'+_docHeader('Contrato de Prestação de Serviços Fisioterapêuticos')
    +'<p>Por este instrumento particular, de um lado <b>'+C.nome+'</b>, representada pela fisioterapeuta <b>'+C.prof+'</b>, inscrita no CREFITO sob o nº <b>'+C.crefito+'</b>, doravante denominada <b>CONTRATADA</b>; e de outro lado o(a) paciente identificado(a) abaixo (ou seu responsável legal), doravante denominado(a) <b>CONTRATANTE</b>, têm entre si justo e contratado o seguinte:</p>'
