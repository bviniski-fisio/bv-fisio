    +'<h2 class="ds">Cláusula 1ª — Do objeto</h2><p>O presente contrato tem por objeto a prestação de serviços de fisioterapia (avaliação, definição de plano terapêutico e atendimento) pela CONTRATADA ao CONTRATANTE, conforme indicação clínica e dentro das competências do(a) fisioterapeuta.</p>'
    +'<h2 class="ds">Cláusula 2ª — Das obrigações da CONTRATADA</h2><p>Realizar os atendimentos com zelo, técnica e de acordo com o Código de Ética e a legislação do COFFITO/CREFITO; manter sigilo profissional; registrar a evolução do tratamento; e orientar o CONTRATANTE quanto aos cuidados necessários.</p>'
    +'<h2 class="ds">Cláusula 3ª — Das obrigações do CONTRATANTE</h2><p>Comparecer aos atendimentos agendados; informar dados de saúde de forma verdadeira; seguir as orientações domiciliares; e efetuar o pagamento na forma ajustada. O cancelamento deve ser comunicado com antecedência mínima de 24 horas.</p>'
    +'<h2 class="ds">Cláusula 4ª — Do valor e da forma de pagamento</h2><p>O valor por sessão/pacote é de R$ __________ , a ser pago via __________________________ , na data acordada entre as partes.</p>'
    +'<h2 class="ds">Cláusula 5ª — Das faltas e cancelamentos</h2><p>O CONTRATANTE compromete-se a comunicar o cancelamento ou reagendamento de qualquer sessão com antecedência mínima de 24 (vinte e quatro) horas. <b>Em caso de falta sem aviso prévio</b> ou de cancelamento fora do prazo estabelecido, <b>a sessão será considerada realizada e cobrada integralmente</b>, uma vez que o horário foi reservado com exclusividade para o CONTRATANTE. Excetuam-se os casos de força maior ou urgência de saúde devidamente justificados.</p>'
    +'<h2 class="ds">Cláusula 6ª — Da vigência e rescisão</h2><p>Este contrato vigora a partir da assinatura e poderá ser rescindido por qualquer das partes, mediante comunicação prévia, quitadas as sessões já realizadas ou devidas nos termos da Cláusula 5ª.</p>'
    +'<h2 class="ds">Cláusula 7ª — Da proteção de dados (LGPD)</h2><p>Os dados pessoais e de saúde do CONTRATANTE serão tratados exclusivamente para fins do atendimento, com base no consentimento e na tutela da saúde, conforme a Lei nº 13.709/2018 (LGPD), sendo mantido o sigilo e garantidos os direitos de acesso, correção e exclusão.</p>'
    +'<h2 class="ds">Cláusula 8ª — Do foro</h2><p>Fica eleito o foro da Comarca de '+C.cidade+'/PE para dirimir eventuais dúvidas oriundas deste contrato.</p>'
    +_docSignBlock(p)
    +'<div class="foot">'+C.nome+' · CREFITO '+C.crefito+' · '+C.tel+' · '+C.email+'</div></div>';
}

function _docTCLE(p){var C=DOCS_CLINICA;
  return '<div class="doc">'+_docHeader('Termo de Consentimento Livre e Esclarecido')
    +_docIdentBlock(p)
    +'<p>Declaro que fui devidamente informado(a) pela fisioterapeuta <b>'+C.prof+'</b> (CREFITO '+C.crefito+') sobre a avaliação fisioterapêutica e o plano de tratamento propostos, incluindo seus objetivos, procedimentos, possíveis desconfortos e os benefícios esperados.</p>'
    +'<h2 class="ds">Esclarecimentos</h2>'
    +'<p>• A fisioterapia pode envolver técnicas manuais, exercícios, uso de recursos físicos e reavaliações periódicas, podendo causar desconforto muscular temporário.<br>'
    +'• Os resultados dependem da evolução individual e da adesão às orientações, não havendo garantia de resultado específico.<br>'
    +'• Tenho liberdade para esclarecer dúvidas a qualquer momento e para interromper o tratamento quando desejar, sem qualquer penalidade.<br>'
    +'• As informações de saúde serão mantidas em sigilo e utilizadas apenas para a condução do tratamento, conforme a LGPD.</p>'
    +'<h2 class="ds">Consentimento</h2><p>Declaro que li e compreendi as informações acima, que minhas dúvidas foram respondidas, e <b>autorizo livremente</b> a realização da avaliação e do tratamento fisioterapêutico propostos.</p>'
    +_docSignBlock(p)
    +'<div class="foot">'+C.nome+' · CREFITO '+C.crefito+' · '+C.tel+'</div></div>';
}

function _docImagem(p){var C=DOCS_CLINICA;
  return '<div class="doc">'+_docHeader('Autorização para Registro e Uso de Imagem')
    +_docIdentBlock(p)
    +'<p>Autorizo a fisioterapeuta <b>'+C.prof+'</b> (CREFITO '+C.crefito+') a realizar <b>registros fotográficos e/ou em vídeo</b> da minha condição física durante a avaliação e o tratamento, com a seguinte finalidade:</p>'
    +'<p class="chk">☐ &nbsp;<b>Documentação clínica e acompanhamento de evolução</b> (uso interno, sigiloso, restrito ao prontuário).</p>'
    +'<p class="chk">☐ &nbsp;<b>Finalidade educativa, científica ou de divulgação</b> (ex.: redes sociais, materiais didáticos), <u>com o rosto preservado</u>, salvo autorização expressa em contrário.</p>'
    +'<p style="font-size:11px;color:#555">Estou ciente de que as imagens serão tratadas conforme a Lei nº 13.709/2018 (LGPD), que esta autorização é gratuita e pode ser <b>revogada a qualquer momento</b> mediante solicitação, e que a recusa não prejudica meu atendimento.</p>'
    +_docSignBlock(p)
    +'<div class="foot">'+C.nome+' · CREFITO '+C.crefito+' · '+C.insta+'</div></div>';
}

function _docsConjunto(p,quais){
  var partes=[];
  if(!quais||quais.indexOf('contrato')>=0)partes.push(_docContrato(p));
  if(!quais||quais.indexOf('tcle')>=0)partes.push(_docTCLE(p));
  if(!quais||quais.indexOf('imagem')>=0)partes.push(_docImagem(p));
  return partes.join('');
}

function gerarDocumentos(pid,quais){
  var p=db.patients.find(function(pt){return pt.id===pid;});
  if(!p){toast('Paciente não encontrado','err');return;}
  var win=window.open('','_blank','width=760,height=920');
  if(!win){toast('Permita pop-ups para gerar os documentos','warn');return;}
  win.document.write('<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">'
    +'<title>Documentos — '+_docEsc(p.name)+'</title><style>:root{--g4:#6E6E64;--or:#E8844A;--gr:#6B8F5E;--g6:#5A5A52;}'+_docCSS()+'</style></head><body>'
    +'<div class="noprint" onclick="window.print()">📄 Toque aqui para imprimir ou salvar como PDF</div>'
    +_docsConjunto(p,quais)
    +'</body></html>');
  win.document.close();
}

function enviarDocsWhatsApp(pid){
  var p=db.patients.find(function(pt){return pt.id===pid;});
  if(!p){toast('Paciente não encontrado','err');return;}
  if(!p.phone){toast('Paciente sem telefone cadastrado','err');return;}
  var nome=(p.name||'').split(' ')[0];
  var msg='Olá, '+nome+'! 😊\n\n*'+DOCS_CLINICA.nome+'*\n'
    +'Seguem os documentos para leitura e assinatura antes do início do tratamento:\n\n'
    +'• Contrato de prestação de serviços\n• Termo de consentimento\n• Autorização de uso de imagem\n\n'
    +'Vou te enviar o PDF em anexo. Qualquer dúvida, estou à disposição.\n\n📞 '+DOCS_CLINICA.tel;
  var tel=(p.phone||'').replace(/\D/g,'');
  if(tel.length<=11)tel='55'+tel;
  window.open('https://wa.me/'+tel+'?text='+encodeURIComponent(msg),'_blank');
  toast('Gere o PDF e anexe na conversa do WhatsApp','ok');
}

function showDocumentos(pid){
  var p=db.patients.find(function(pt){return pt.id===pid;});
  if(!p)return;
  curPid=pid;curView='docs';
  var docs=[
    {id:'contrato',ic:'📑',nome:'Contrato de Prestação de Serviços',desc:'Acordo entre paciente e profissional, com cláusula de LGPD.'},
    {id:'tcle',ic:'✍️',nome:'Termo de Consentimento Livre e Esclarecido',desc:'Esclarece o tratamento e registra a autorização do paciente.'},
    {id:'imagem',ic:'📷',nome:'Autorização de Uso de Imagem',desc:'Consentimento para registro fotográfico de evolução.'}
  ];
  var cards=docs.map(function(d){
    return '<div style="display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E6DECE;border-radius:11px;padding:13px 15px;margin-bottom:10px">'
      +'<div style="font-size:22px">'+d.ic+'</div>'
      +'<div style="flex:1"><div style="font-weight:700;font-size:13.5px;color:#3a2f22">'+d.nome+'</div>'
      +'<div style="font-size:11.5px;color:var(--g4)">'+d.desc+'</div></div>'
      +'<button class="btn" style="background:#C86A32;color:#fff;padding:8px 13px;white-space:nowrap" onclick="gerarDocumentos('+pid+',[\''+d.id+'\'])">PDF</button>'
      +'</div>';
  }).join('');
  var html='<div class="pt-profile">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px">'
    +'<button class="btn btn-w" style="color:#1a1a14" onclick="selPatient('+pid+')">← Voltar</button>'
    +'<div style="text-align:right"><div style="font-family:\'Cormorant Garamond\',serif;font-size:22px;font-weight:700;color:#C86A32;line-height:1">Documentos</div>'
    +'<div style="font-size:11px;color:var(--g4)">'+_docEsc(p.name)+'</div></div></div>'
    +'<div style="background:#EDF2E8;border:1px solid #CBD8BD;border-radius:10px;padding:11px 14px;font-size:12px;color:#4A6B3E;margin:10px 0 16px">'
    +'Documentação obrigatória CREFITO. Os textos são <b>modelos base</b> — revise valores e cláusulas e ajuste conforme orientação jurídica antes de usar.</div>'
    +cards
    +'<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px">'
    +'<button class="btn" style="background:#3a2f22;color:#fff;padding:11px 18px" onclick="gerarDocumentos('+pid+',null)">📄 Gerar PDF (todos)</button>'
    +(p.phone?'<button class="btn" style="background:#25D366;color:#fff;padding:11px 18px" onclick="enviarDocsWhatsApp('+pid+')">💬 Enviar por WhatsApp</button>':'')
    +'</div></div>';
  document.getElementById('mainArea').innerHTML=html;
}

function aposCriarPaciente(pid){
  var p=db.patients.find(function(pt){return pt.id===pid;});
  if(!p)return;
  var ov=document.createElement('div');
  ov.className='ov';ov.style.display='flex';
  ov.innerHTML='<div class="modal" style="max-width:380px;text-align:center">'
    +'<div style="font-size:34px;margin-bottom:6px">📂</div>'
    +'<h3 style="margin-bottom:6px">Documentos obrigatórios</h3>'
    +'<p style="color:#5A5347;font-size:13px;margin-bottom:18px">Gerei o contrato, o termo de consentimento e a autorização de imagem de <b>'+_docEsc((p.name||'').split(' ')[0])+'</b>, já preenchidos. Deseja enviar agora?</p>'
    +'<div style="display:flex;flex-direction:column;gap:8px">'
    +'<button class="btn" style="background:#3a2f22;color:#fff;padding:11px" onclick="gerarDocumentos('+pid+',null)">📄 Baixar PDF</button>'
    +(p.phone?'<button class="btn" style="background:#25D366;color:#fff;padding:11px" onclick="enviarDocsWhatsApp('+pid+')">💬 Enviar por WhatsApp</button>':'')
    +'<button class="btn" style="background:#ede8e0;color:#5A5347;padding:11px" onclick="this.closest(\'.ov\').remove()">Depois</button>'
    +'</div></div>';
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}

</script>

<script>
// PWA Service Worker Registration – requer HTTPS
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('https://bviniski-fisio.github.io/bv-fisio/sw.js').then(function(reg){
      reg.update();
      reg.addEventListener('updatefound', function(){
        var nw = reg.installing;
        if(!nw) return;
        nw.addEventListener('statechange', function(){
          if(nw.state === 'installed' && navigator.serviceWorker.controller){
            nw.postMessage({type:'SKIP_WAITING'});
          }
        });
      });
      setInterval(function(){ reg.update(); }, 60*60*1000);
    }).catch(function(){});
    var _swReloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', function(){
      if(_swReloaded) return; _swReloaded = true; window.location.reload();
    });
  });
}
</script>
